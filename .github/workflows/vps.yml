name: Temporary VPS (Ngrok SSH + Countdown)

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: '💻 Hệ điều hành'
        required: true
        default: 'ubuntu-24.04'
        type: choice
        options:
          - 'ubuntu-20.04'
          - 'ubuntu-22.04'
          - 'ubuntu-24.04'
          - 'windows-latest'
          - 'windows-2022'
      ssh_user:
        description: '👤 SSH username'
        required: true
        default: 'runner'
      ssh_password:
        description: '🔑 SSH password'
        required: true
        default: 'MySecurePass123'
      enable_root_ssh:
        description: '🚀 Cho phép đăng nhập root/Administrator?'
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      ssh_port:
        description: '🔌 SSH port (mặc định 22)'
        required: true
        default: '22'
      timezone:
        description: '🕒 Múi giờ (vd: Asia/Ho_Chi_Minh, UTC)'
        required: true
        default: 'UTC'
      max_runtime:
        description: '⏱️ Max runtime (minutes, max 350)'
        required: true
        default: '330'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '330'
          - '350'

jobs:
  vps:
    runs-on: ${{ github.event.inputs.runner_os }}
    timeout-minutes: 350

    steps:
      - name: Check runtime
        id: runtime
        shell: bash
        run: |
          MAX="${{ github.event.inputs.max_runtime }}"
          if [ "$MAX" -gt 350 ]; then MAX=350; fi
          echo "max=$MAX" >> $GITHUB_OUTPUT

      - name: Setup Linux VPS (Ngrok tunnel + Countdown)
        if: runner.os == 'Linux'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          ENABLE_ROOT: ${{ github.event.inputs.enable_root_ssh }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
          NGROK_TOKEN: ${{ vars.NGROK_AUTH_TOKEN }}
          TIMEZONE: ${{ github.event.inputs.timezone }}
        run: |
          set -e
          echo ">>> Cài đặt công cụ..."
          sudo apt update -qq && sudo apt install -y -qq openssh-server curl jq tmux

          echo ">>> Cài đặt timezone $TIMEZONE..."
          sudo timedatectl set-timezone "$TIMEZONE" || true

          # ---- Cấu hình user & root ----
          if [ "$ENABLE_ROOT" = "yes" ]; then
            echo ">>> Cho phép root SSH..."
            echo "root:$SSH_PASS" | sudo chpasswd
            sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
            sudo sed -i 's/^PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          fi

          echo ">>> Tạo/cập nhật user $SSH_USER..."
          if id "$SSH_USER" &>/dev/null; then
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
          else
            sudo useradd -m -s /bin/bash "$SSH_USER"
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
            sudo usermod -aG sudo "$SSH_USER"
          fi

          # Cho phép sudo không cần password
          echo "$SSH_USER ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/$SSH_USER

          echo ">>> Cấu hình SSH port $SSH_PORT..."
          sudo sed -i "s/^#Port 22/Port $SSH_PORT/" /etc/ssh/sshd_config
          sudo sed -i "s/^Port 22/Port $SSH_PORT/" /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

          # ---- Cài Ngrok ----
          echo ">>> Cài đặt Ngrok..."
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update -qq && sudo apt install -y -qq ngrok

          echo ">>> Xác thực Ngrok..."
          ngrok config add-authtoken "$NGROK_TOKEN"

          echo ">>> Mở tunnel TCP $SSH_PORT..."
          nohup ngrok tcp "$SSH_PORT" --log=stdout > /tmp/ngrok.log 2>&1 &
          sleep 5

          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/tcp:\/\///')
          if [ -z "$NGROK_URL" ]; then
            echo "❌ Không lấy được tunnel. Log:"
            cat /tmp/ngrok.log
            exit 1
          fi

          SSH_HOST=$(echo "$NGROK_URL" | cut -d: -f1)
          SSH_PORT_REMOTE=$(echo "$NGROK_URL" | cut -d: -f2)

          # ---- Script đếm ngược ----
          cat > /home/runner/countdown.sh << 'SCRIPT'
          #!/bin/bash
          END_TIME=$(( $(date +%s) + MAX_MINUTES * 60 ))
          while true; do
            NOW=$(date +%s)
            REMAINING=$(( END_TIME - NOW ))
            if [ $REMAINING -le 0 ]; then
              echo "Hết giờ! VPS sẽ tắt."
              break
            fi
            clear
            echo "========================================"
            echo "  VPS TEMPORARY - ĐẾM NGƯỢC THỜI GIAN"
            echo "  Thời gian còn lại: $(( REMAINING / 60 )) phút $(( REMAINING % 60 )) giây"
            echo "========================================"
            echo ""
            echo "  👉 Nhấn Ctrl+B sau đó nhấn D để thoát"
            echo "     (không dùng lệnh exit)"
            echo ""
            sleep 30
          done
          SCRIPT

          export MAX_MINUTES
          chmod +x /home/runner/countdown.sh
          tmux new-session -d -s thoigian /home/runner/countdown.sh

          # ---- Thông báo kết nối ----
          echo "=============================================="
          echo "✅ VPS đã sẵn sàng!"
          echo ""
          echo "🖥️  OS: Linux (${{ github.event.inputs.runner_os }})"
          echo "🕒 TZ: $TIMEZONE"
          if [ "$ENABLE_ROOT" = "yes" ]; then
            echo "🚀 Root SSH: ENABLED"
          fi
          echo ""
          echo "💻 SSH command:"
          echo "   ssh -p $SSH_PORT_REMOTE $SSH_USER@$SSH_HOST"
          if [ "$ENABLE_ROOT" = "yes" ]; then
            echo "   hoặc ssh -p $SSH_PORT_REMOTE root@$SSH_HOST"
          fi
          echo "🔑 Password: $SSH_PASS"
          echo "=============================================="

          for ((i=MAX_MINUTES; i>0; i--)); do
            echo "⏱️  Thời gian còn lại: $i phút"
            sleep 60
          done
          echo "🛑 Hết giờ, VPS dừng."

      - name: Setup Windows VPS (Ngrok tunnel + Countdown)
        if: runner.os == 'Windows'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          ENABLE_ROOT: ${{ github.event.inputs.enable_root_ssh }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
          NGROK_TOKEN: ${{ vars.NGROK_AUTH_TOKEN }}
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host ">>> Cài đặt Ngrok qua Chocolatey..."
          choco install ngrok -y --no-progress

          Write-Host ">>> Cấu hình User & Password..."
          $Password = ConvertTo-SecureString $env:SSH_PASS -AsPlainText -Force
          if ($env:ENABLE_ROOT -eq "yes") {
              $TargetUser = "Administrator"
              Set-LocalUser -Name "Administrator" -Password $Password
          } else {
              $TargetUser = $env:SSH_USER
              if (Get-LocalUser -Name $TargetUser -ErrorAction SilentlyContinue) {
                  Set-LocalUser -Name $TargetUser -Password $Password
              } else {
                  New-LocalUser -Name $TargetUser -Password $Password -FullName $TargetUser -Description "VPS User"
                  Add-LocalGroupMember -Group "Administrators" -Member $TargetUser
              }
          }

          Write-Host ">>> Cấu hình SSH Server (OpenSSH)..."
          # Kích hoạt OpenSSH Server có sẵn trên GitHub Windows Runner
          Start-Service sshd
          Set-Service -Name sshd -StartupType 'Automatic'

          # Đổi Port nếu không dùng 22
          $SshdConfig = "$env:ProgramData\ssh\sshd_config"
          if (Test-Path $SshdConfig) {
              (Get-Content $SshdConfig) -replace '^#?Port .*', "Port $env:SSH_PORT" | Set-Content $SshdConfig
              Restart-Service sshd
          }

          Write-Host ">>> Mở Firewall cho SSH port $env:SSH_PORT..."
          New-NetFirewallRule -Name "Open SSH Port" -DisplayName "Open SSH Port" -Enabled True -Direction Inbound -Protocol TCP -Action Allow -LocalPort $env:SSH_PORT | Out-Null

          Write-Host ">>> Khởi động Ngrok Tunnel..."
          ngrok config add-authtoken $env:NGROK_TOKEN
          Start-Process -FilePath "ngrok" -ArgumentList "tcp $env:SSH_PORT" -NoNewWindow
          Start-Sleep -Seconds 5

          $Tunnels = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
          $NgrokUrl = $Tunnels.tunnels[0].public_url -replace "tcp://", ""

          if ([string]::IsNullOrEmpty($NgrokUrl)) {
              Write-Host "❌ Không lấy được tunnel. Kiểm tra lại NGROK_AUTH_TOKEN."
              exit 1
          }

          $HostPort = $NgrokUrl -split ":"
          $SshHost = $HostPort[0]
          $SshPortRemote = $HostPort[1]

          Write-Host "=============================================="
          Write-Host "✅ WINDOWS VPS ĐÃ SẴN SÀNG!"
          Write-Host ""
          Write-Host "🖥️ OS: Windows (${{ github.event.inputs.runner_os }})"
          Write-Host "👤 User: $TargetUser"
          Write-Host ""
          Write-Host "💻 SSH command:"
          Write-Host "   ssh -p $SshPortRemote $TargetUser@$SshHost"
          Write-Host "🔑 Password: $env:SSH_PASS"
          Write-Host "=============================================="

          $MaxMinutes = [int]$env:MAX_MINUTES
          for ($i = $MaxMinutes; $i -gt 0; $i--) {
              Write-Host "⏱️ Thời gian còn lại: $i phút"
              Start-Sleep -Seconds 60
          }
          Write-Host "🛑 Hết giờ, VPS dừng."
