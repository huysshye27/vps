name: Temporary VPS (tmate - copy & paste)

on:
  workflow_dispatch:
    inputs:
      max_runtime:
        description: '⏱️ Max runtime (minutes, max 350)'
        required: true
        default: '330'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '330'
          - '350'

jobs:
  vps:
    runs-on: ubuntu-24.04
    timeout-minutes: 350

    steps:
      - name: Check runtime
        id: runtime
        run: |
          MAX=${{ github.event.inputs.max_runtime }}
          if [ "$MAX" -gt 350 ]; then MAX=350; fi
          echo "max=$MAX" >> $GITHUB_OUTPUT

      - name: Start tmate session (detached, no auth)
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true
          # Không giới hạn truy cập -> tmate sinh key ngẫu nhiên và in ra connection string

      - name: Keep VPS alive
        run: |
          echo "⏳ VPS sẽ tồn tại ${{ steps.runtime.outputs.max }} phút."
          sleep $(( ${{ steps.runtime.outputs.max }} * 60 - 60 ))
          echo "🛑 Hết thời gian, VPS sẽ bị hủy."
