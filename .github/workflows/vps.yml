name: Temporary VPS (serveo.net - fixed)

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: '💻 Hệ điều hành'
        required: true
        default: 'ubuntu-24.04'
        type: choice
        options:
          - 'ubuntu-20.04'
          - 'ubuntu-22.04'
          - 'ubuntu-24.04'
          - 'windows-latest'
          - 'windows-2022'
          - 'macos-latest'
          - 'macos-13'
      connection_type:
        description: '🌐 Giao thức (SSH = Dòng lệnh, RDP/VNC = Đồ họa)'
        required: true
        default: 'ssh'
        type: choice
        options:
          - 'ssh'
          - 'rdp'
          - 'vnc'
      ssh_user:
        description: '👤 Username'
        required: true
        default: 'runner'
      ssh_password:
        description: '🔑 Password (Phải có hoa, thường, số, ký tự đặc biệt)'
        required: true
        default: 'Vps@Secure2026!'
      enable_root_ssh:
        description: '🚀 Cho phép root/runneradmin?'
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      ssh_port:
        description: '🔌 SSH port (Chỉ dùng nếu chọn SSH)'
        required: true
        default: '22'
      timezone:
        description: '🕒 Múi giờ'
        required: true
        default: 'UTC'
      max_runtime:
        description: '⏱️ Max runtime (phút, tối đa 350)'
        required: true
        default: '330'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '330'
          - '350'
      auto_rerun:
        description: '🔄 Tự động rerun khi hết giờ?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  actions: write

jobs:
  vps:
    runs-on: ${{ github.event.inputs.runner_os }}
    timeout-minutes: 350

    steps:
      - name: Check runtime
        id: runtime
        shell: bash
        run: |
          MAX="${{ github.event.inputs.max_runtime }}"
          if [ "$MAX" -gt 350 ]; then MAX=350; fi
          echo "max=$MAX" >> $GITHUB_OUTPUT

      # ==========================================
      # 🐧 LINUX (SSH / RDP) + serveo.net
      # ==========================================
      - name: Setup Linux VPS
        if: runner.os == 'Linux'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          ENABLE_ROOT: ${{ github.event.inputs.enable_root_ssh }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          CONNECTION_TYPE: ${{ github.event.inputs.connection_type }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
          TIMEZONE: ${{ github.event.inputs.timezone }}
          AUTO_RERUN: ${{ github.event.inputs.auto_rerun }}
        run: |
          set -e
          sudo timedatectl set-timezone "$TIMEZONE" || true

          # Tạo user
          if [ "$ENABLE_ROOT" = "yes" ]; then
            echo "root:$SSH_PASS" | sudo chpasswd
          fi
          if id "$SSH_USER" &>/dev/null; then
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
          else
            sudo useradd -m -s /bin/bash "$SSH_USER"
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
            sudo usermod -aG sudo "$SSH_USER"
          fi
          echo "$SSH_USER ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/$SSH_USER

          # Cài desktop nếu cần
          if [ "$CONNECTION_TYPE" = "rdp" ] || [ "$CONNECTION_TYPE" = "vnc" ]; then
            echo ">>> Cài đặt XFCE4 và XRDP..."
            sudo apt update -qq
            sudo DEBIAN_FRONTEND=noninteractive apt install -y -qq xfce4 xfce4-goodies xrdp curl jq
            sudo systemctl enable xrdp
            sudo adduser xrdp ssl-cert
            echo xfce4-session > /home/$SSH_USER/.xsession
            sudo chown $SSH_USER:$SSH_USER /home/$SSH_USER/.xsession
            sudo systemctl restart xrdp
            LOCAL_PORT=3389
            PROT_NAME="RDP"
          else
            echo ">>> Cấu hình SSH..."
            sudo apt update -qq && sudo apt install -y -qq openssh-server curl jq tmux
            sudo sed -i "s/^#Port 22/Port $SSH_PORT/" /etc/ssh/sshd_config
            sudo sed -i "s/^Port 22/Port $SSH_PORT/" /etc/ssh/sshd_config
            sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            sudo systemctl restart ssh
            LOCAL_PORT=$SSH_PORT
            PROT_NAME="SSH"
          fi

          # Tạo tunnel với serveo.net (đã fix)
          echo ">>> Khởi tạo tunnel serveo.net..."
          nohup ssh -T -N -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=60 -o ExitOnForwardFailure=yes \
            -R 0:localhost:$LOCAL_PORT serveo.net > /tmp/serveo.log 2>&1 &
          sleep 8

          # Lấy URL: dạng subdomain.serveo.net
          TUNNEL_URL=$(grep -o 'https\?://[^ ]*\.serveo\.net' /tmp/serveo.log | head -1)
          if [ -z "$TUNNEL_URL" ]; then
            TUNNEL_URL=$(grep -o '[a-z0-9-]*\.serveo\.net' /tmp/serveo.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              TUNNEL_URL="tcp://$TUNNEL_URL"
            else
              echo "❌ Không lấy được URL từ serveo. Kiểm tra log:"
              cat /tmp/serveo.log
              exit 1
            fi
          fi
          TUNNEL_ADDR=$(echo $TUNNEL_URL | sed 's/^tcp:\/\///' | sed 's/^https:\/\///')
          if [ -z "$TUNNEL_ADDR" ]; then
            TUNNEL_ADDR=$TUNNEL_URL
          fi

          echo "=============================================="
          echo "✅ LINUX VPS SẴN SÀNG ($PROT_NAME)!"
          echo "🖥️ OS: Ubuntu (${{ github.event.inputs.runner_os }})"
          echo "👤 User: $SSH_USER"
          echo "🔑 Pass: $SSH_PASS"
          echo "🌐 Địa chỉ kết nối: $TUNNEL_ADDR"
          echo "=============================================="

          for ((i=MAX_MINUTES; i>0; i--)); do echo "⏱️ $i phút..."; sleep 60; done

          if [ "$AUTO_RERUN" = "yes" ]; then
            curl -L -X POST -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/rerun
          fi

      # ==========================================
      # 🪟 WINDOWS (SSH / RDP) + serveo.net
      # ==========================================
      - name: Setup Windows VPS
        if: runner.os == 'Windows'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          ENABLE_ROOT: ${{ github.event.inputs.enable_root_ssh }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          CONNECTION_TYPE: ${{ github.event.inputs.connection_type }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
          AUTO_RERUN: ${{ github.event.inputs.auto_rerun }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install jq -y --no-progress | Out-Null

          # Tạo user
          $Password = ConvertTo-SecureString $env:SSH_PASS -AsPlainText -Force
          if ($env:ENABLE_ROOT -eq "yes") {
              $TargetUser = "runneradmin"
          } else {
              $TargetUser = $env:SSH_USER
          }
          try {
              if (Get-LocalUser -Name $TargetUser -ErrorAction SilentlyContinue) {
                  Set-LocalUser -Name $TargetUser -Password $Password
              } else {
                  New-LocalUser -Name $TargetUser -Password $Password -FullName $TargetUser -Description "VPS User"
                  Add-LocalGroupMember -Group "Administrators" -Member $TargetUser
              }
          } catch {
              Write-Host "❌ LỖI TẠO USER: Mật khẩu yếu hoặc vi phạm chính sách!"
              Write-Host "👉 YÊU CẦU: dài >=8, có HOA, thường, số, ký tự đặc biệt, không chứa tên user."
              exit 1
          }

          # Cấu hình RDP/SSH
          if ($env:CONNECTION_TYPE -eq 'rdp' -or $env:CONNECTION_TYPE -eq 'vnc') {
              Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
              Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
              Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -value 1
              $LocalPort = 3389
              $ProtName = "RDP"
          } else {
              Start-Service sshd
              Set-Service -Name sshd -StartupType 'Automatic'
              $SshdConfig = "$env:ProgramData\ssh\sshd_config"
              if (Test-Path $SshdConfig) {
                  (Get-Content $SshdConfig) -replace '^#?Port .*', "Port $env:SSH_PORT" | Set-Content $SshdConfig
                  Restart-Service sshd
              }
              New-NetFirewallRule -Name "Open SSH Port" -DisplayName "Open SSH Port" -Enabled True -Direction Inbound -Protocol TCP -Action Allow -LocalPort $env:SSH_PORT | Out-Null
              $LocalPort = $env:SSH_PORT
              $ProtName = "SSH"
          }

          # Tunnel serveo.net
          Write-Host ">>> Khởi tạo tunnel serveo.net..."
          $sshArgs = "-T -N -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=60 -o ExitOnForwardFailure=yes -R 0:localhost:$LocalPort serveo.net"
          Start-Process -FilePath "ssh" -ArgumentList $sshArgs -RedirectStandardOutput "serveo.log" -NoNewWindow
          Start-Sleep -Seconds 8

          $logContent = Get-Content "serveo.log" -Raw
          $urlMatch = [regex]::Match($logContent, 'https?://([a-z0-9-]+\.serveo\.net)')
          if ($urlMatch.Success) {
              $TunnelAddr = $urlMatch.Groups[1].Value
          } else {
              $urlMatch = [regex]::Match($logContent, '([a-z0-9-]+\.serveo\.net)')
              if ($urlMatch.Success) {
                  $TunnelAddr = $urlMatch.Groups[1].Value
              } else {
                  Write-Host "❌ Không lấy được URL từ serveo. Kiểm tra serveo.log:"
                  Get-Content "serveo.log"
                  exit 1
              }
          }

          Write-Host "=============================================="
          Write-Host "✅ WINDOWS VPS SẴN SÀNG ($ProtName)!"
          Write-Host "🖥️ OS: Windows (${{ github.event.inputs.runner_os }})"
          Write-Host "👤 User: $TargetUser"
          Write-Host "🔑 Pass: $env:SSH_PASS"
          Write-Host "🌐 Địa chỉ kết nối: $TunnelAddr"
          Write-Host "=============================================="

          $MaxMinutes = [int]$env:MAX_MINUTES
          for ($i = $MaxMinutes; $i -gt 0; $i--) { Write-Host "⏱️ $i phút..."; Start-Sleep -Seconds 60 }

          if ($env:AUTO_RERUN -eq "yes") {
              $headers = @{
                  "Accept" = "application/vnd.github+json"
                  "Authorization" = "Bearer ${{ github.token }}"
                  "X-GitHub-Api-Version" = "2022-11-28"
              }
              $uri = "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/rerun"
              Invoke-RestMethod -Method POST -Uri $uri -Headers $headers
          }

      # ==========================================
      # 🍎 macOS (SSH / VNC) + serveo.net
      # ==========================================
      - name: Setup macOS VPS
        if: runner.os == 'macOS'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          CONNECTION_TYPE: ${{ github.event.inputs.connection_type }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
          AUTO_RERUN: ${{ github.event.inputs.auto_rerun }}
        run: |
          set -e
          brew install jq --quiet

          if ! id "$SSH_USER" &>/dev/null; then
              sudo sysadminctl -addUser "$SSH_USER" -password "$SSH_PASS" -admin
          else
              sudo dscl . -passwd /Users/"$SSH_USER" "$SSH_PASS"
          fi

          if [ "$CONNECTION_TYPE" = "rdp" ] || [ "$CONNECTION_TYPE" = "vnc" ]; then
              sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
              sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -allowAccessFor -specifiedUsers
              sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -users "$SSH_USER" -access -on -privs -all
              LOCAL_PORT=5900
              PROT_NAME="VNC (Screen Sharing)"
          else
              sudo systemsetup -setremotelogin on
              LOCAL_PORT=22
              PROT_NAME="SSH"
          fi

          echo ">>> Khởi tạo tunnel serveo.net..."
          nohup ssh -T -N -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=60 -o ExitOnForwardFailure=yes \
            -R 0:localhost:$LOCAL_PORT serveo.net > /tmp/serveo.log 2>&1 &
          sleep 8

          TUNNEL_URL=$(grep -o 'https\?://[^ ]*\.serveo\.net' /tmp/serveo.log | head -1)
          if [ -z "$TUNNEL_URL" ]; then
            TUNNEL_URL=$(grep -o '[a-z0-9-]*\.serveo\.net' /tmp/serveo.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              TUNNEL_URL="tcp://$TUNNEL_URL"
            else
              echo "❌ Không lấy được URL từ serveo. Kiểm tra log:"
              cat /tmp/serveo.log
              exit 1
            fi
          fi
          TUNNEL_ADDR=$(echo $TUNNEL_URL | sed 's/^tcp:\/\///' | sed 's/^https:\/\///')
          if [ -z "$TUNNEL_ADDR" ]; then
            TUNNEL_ADDR=$TUNNEL_URL
          fi

          echo "=============================================="
          echo "✅ macOS VPS SẴN SÀNG ($PROT_NAME)!"
          echo "🖥️ OS: macOS (${{ github.event.inputs.runner_os }})"
          echo "👤 User: $SSH_USER"
          echo "🔑 Pass: $SSH_PASS"
          echo "🌐 Địa chỉ kết nối: $TUNNEL_ADDR"
          echo "=============================================="

          for ((i=MAX_MINUTES; i>0; i--)); do echo "⏱️ $i phút..."; sleep 60; done

          if [ "$AUTO_RERUN" = "yes" ]; then
            curl -L -X POST -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/rerun
          fi
