name: Tailscale Access - All Platforms

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: '💻 Hệ điều hành'
        required: true
        default: 'ubuntu-24.04'
        type: choice
        options:
          - 'ubuntu-20.04'
          - 'ubuntu-22.04'
          - 'ubuntu-24.04'
          - 'windows-latest'
          - 'windows-2022'
          - 'macos-latest'
          - 'macos-13'
      target_host:
        description: '🌐 Host/IP trong Tailnet cần kiểm tra, ví dụ: my-server hoặc 100.x.y.z'
        required: false
        default: ''
      ssh_user:
        description: '👤 Username máy đích trong Tailnet'
        required: false
        default: 'runner'
      ssh_port:
        description: '🔌 SSH port máy đích'
        required: true
        default: '22'
      timezone:
        description: '🕒 Múi giờ'
        required: true
        default: 'Asia/Ho_Chi_Minh'
      max_runtime:
        description: '⏱️ Max runtime (minutes, max 350)'
        required: true
        default: '330'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '330'
          - '350'

jobs:
  tailscale:
    runs-on: ${{ github.event.inputs.runner_os }}
    timeout-minutes: 350

    steps:
      - name: Check runtime
        id: runtime
        shell: bash
        run: |
          MAX="${{ github.event.inputs.max_runtime }}"
          if [ "$MAX" -gt 350 ]; then MAX=350; fi
          echo "max=$MAX" >> $GITHUB_OUTPUT

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ vars.TAILSCALE_AUTHKEY }}
          version: latest

      # ==========================================
      # 🐧 LINUX
      # ==========================================
      - name: Setup Linux Tailscale Access
        if: runner.os == 'Linux'
        env:
          TARGET_HOST: ${{ github.event.inputs.target_host }}
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
          TIMEZONE: ${{ github.event.inputs.timezone }}
        shell: bash
        run: |
          set -e

          sudo timedatectl set-timezone "$TIMEZONE" || true
          sudo apt update -qq
          sudo apt install -y -qq curl jq tmux openssh-client

          echo ">>> Lấy IP Tailscale của runner..."
          sleep 3

          TAILSCALE_IP=$(tailscale ip -4 | head -n 1)

          if [ -z "$TAILSCALE_IP" ]; then
            echo "❌ Không lấy được Tailscale IP."
            tailscale status || true
            exit 1
          fi

          echo "=============================================="
          echo "✅ LINUX RUNNER ĐÃ VÀO TAILSCALE!"
          echo "🖥️ OS: Linux (${{ github.event.inputs.runner_os }})"
          echo "🌐 Runner Tailscale IP: $TAILSCALE_IP"
          echo "=============================================="
          echo "📋 Tailnet status:"
          tailscale status || true
          echo "=============================================="

          if [ -n "$TARGET_HOST" ]; then
            echo ">>> Kiểm tra kết nối tới target: $TARGET_HOST"
            tailscale ping "$TARGET_HOST" || true

            echo "=============================================="
            echo "👉 Lệnh SSH tới máy đích nếu đã cấu hình key/password:"
            echo "ssh -p $SSH_PORT $SSH_USER@$TARGET_HOST"
            echo "=============================================="
          else
            echo "ℹ️ Bạn chưa nhập target_host."
            echo "👉 Hãy nhập hostname hoặc IP Tailscale của máy cần remote, ví dụ: 100.x.y.z"
          fi

          for ((i=MAX_MINUTES; i>0; i--)); do
            echo "⏱️ $i phút..."
            sleep 60
          done

      # ==========================================
      # 🪟 WINDOWS
      # ==========================================
      - name: Setup Windows Tailscale Access
        if: runner.os == 'Windows'
        env:
          TARGET_HOST: ${{ github.event.inputs.target_host }}
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Start-Sleep -Seconds 3

          $TailscaleIp = (tailscale ip -4 | Select-Object -First 1)

          if (-not $TailscaleIp) {
            Write-Host "❌ Không lấy được Tailscale IP."
            tailscale status
            throw "Tailscale IP not found"
          }

          Write-Host "=============================================="
          Write-Host "✅ WINDOWS RUNNER ĐÃ VÀO TAILSCALE!"
          Write-Host "🖥️ OS: Windows (${{ github.event.inputs.runner_os }})"
          Write-Host "🌐 Runner Tailscale IP: $TailscaleIp"
          Write-Host "=============================================="
          Write-Host "📋 Tailnet status:"
          tailscale status
          Write-Host "=============================================="

          if ($env:TARGET_HOST -ne "") {
            Write-Host ">>> Kiểm tra kết nối tới target: $env:TARGET_HOST"
            tailscale ping $env:TARGET_HOST

            Write-Host "=============================================="
            Write-Host "👉 Lệnh SSH tới máy đích nếu đã cấu hình key/password:"
            Write-Host "ssh -p $env:SSH_PORT $env:SSH_USER@$env:TARGET_HOST"
            Write-Host "=============================================="
          } else {
            Write-Host "ℹ️ Bạn chưa nhập target_host."
            Write-Host "👉 Hãy nhập hostname hoặc IP Tailscale của máy cần remote, ví dụ: 100.x.y.z"
          }

          $MaxMinutes = [int]$env:MAX_MINUTES
          for ($i = $MaxMinutes; $i -gt 0; $i--) {
            Write-Host "⏱️ $i phút..."
            Start-Sleep -Seconds 60
          }

      # ==========================================
      # 🍎 macOS
      # ==========================================
      - name: Setup macOS Tailscale Access
        if: runner.os == 'macOS'
        env:
          TARGET_HOST: ${{ github.event.inputs.target_host }}
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
          TIMEZONE: ${{ github.event.inputs.timezone }}
        shell: bash
        run: |
          set -e

          sudo systemsetup -settimezone "$TIMEZONE" || true
          brew install jq --quiet || true

          echo ">>> Lấy IP Tailscale của runner..."
          sleep 3

          TAILSCALE_IP=$(tailscale ip -4 | head -n 1)

          if [ -z "$TAILSCALE_IP" ]; then
            echo "❌ Không lấy được Tailscale IP."
            tailscale status || true
            exit 1
          fi

          echo "=============================================="
          echo "✅ macOS RUNNER ĐÃ VÀO TAILSCALE!"
          echo "🖥️ OS: macOS (${{ github.event.inputs.runner_os }})"
          echo "🌐 Runner Tailscale IP: $TAILSCALE_IP"
          echo "=============================================="
          echo "📋 Tailnet status:"
          tailscale status || true
          echo "=============================================="

          if [ -n "$TARGET_HOST" ]; then
            echo ">>> Kiểm tra kết nối tới target: $TARGET_HOST"
            tailscale ping "$TARGET_HOST" || true

            echo "=============================================="
            echo "👉 Lệnh SSH tới máy đích nếu đã cấu hình key/password:"
            echo "ssh -p $SSH_PORT $SSH_USER@$TARGET_HOST"
            echo "=============================================="
          else
            echo "ℹ️ Bạn chưa nhập target_host."
            echo "👉 Hãy nhập hostname hoặc IP Tailscale của máy cần remote, ví dụ: 100.x.y.z"
          fi

          for ((i=MAX_MINUTES; i>0; i--)); do
            echo "⏱️ $i phút..."
            sleep 60
          done
