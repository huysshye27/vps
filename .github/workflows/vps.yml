name: Temporary VPS (Web Terminal + File Manager)

on:
  workflow_dispatch:
    inputs:
      terminal_user:
        description: '👤 User bảo vệ terminal (bỏ trống nếu không cần)'
        required: false
        default: ''
      terminal_password:
        description: '🔑 Mật khẩu bảo vệ terminal'
        required: false
        default: ''
      max_runtime:
        description: '⏱️ Thời gian chạy tối đa (phút)'
        required: true
        default: '330'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '330'
          - '350'

jobs:
  vps:
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ github.event.inputs.max_runtime }}

    steps:
      - name: Cài đặt công cụ cơ bản
        run: |
          sudo apt update -qq
          sudo apt install -y -qq curl wget jq

      - name: Cài đặt cloudflared
        run: |
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared version

      - name: Cài đặt ttyd (Web Terminal)
        run: |
          wget -qO ttyd https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
          chmod +x ttyd
          sudo mv ttyd /usr/local/bin/

      - name: Cài đặt File Browser (File Manager)
        run: |
          curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash
          sudo mv filebrowser /usr/local/bin/

      - name: Tạo user và chuẩn bị thư mục
        run: |
          sudo useradd -m -s /bin/bash devuser
          echo "devuser:password" | sudo chpasswd
          sudo usermod -aG sudo devuser
          echo "devuser ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/devuser

          # Thư mục làm việc chung (root của file manager)
          sudo mkdir -p /home/workspace
          sudo chown devuser:devuser /home/workspace

      - name: Cấu hình File Browser
        run: |
          # Tạo config cho filebrowser
          cat > /home/runner/filebrowser.json << 'EOF'
          {
            "port": 8081,
            "baseURL": "/files",
            "address": "127.0.0.1",
            "root": "/home/workspace",
            "auth.method": "noauth",
            "branding.name": "VPS Files",
            "commands": [],
            "shell": ""
          }
          EOF

      - name: Chạy dịch vụ và tạo tunnel
        run: |
          # Bảo vệ terminal bằng auth nếu có
          if [ -n "${{ github.event.inputs.terminal_user }}" ] && [ -n "${{ github.event.inputs.terminal_password }}" ]; then
            AUTH_OPTS="-c ${{ github.event.inputs.terminal_user }}:${{ github.event.inputs.terminal_password }}"
          else
            AUTH_OPTS=""
          fi

          # Chạy ttyd (terminal) trên port 8080, user devuser
          ttyd -p 8080 $AUTH_OPTS sudo -u devuser bash &
          sleep 2

          # Chạy filebrowser trên port 8081
          filebrowser -c /home/runner/filebrowser.json &
          sleep 2

          # Tạo Cloudflare Tunnel trỏ đến localhost:8080 (terminal). 
          # Để truy cập cả hai, ta cần một reverse proxy đơn giản hoặc dùng cloudflared với ingress rules.
          # Nhưng với TryCloudflare (miễn phí), mỗi tunnel chỉ trỏ đến 1 địa chỉ.
          # Vì vậy ta sẽ chạy 2 tunnel riêng biệt: 1 cho terminal, 1 cho file manager.
          cloudflared tunnel --url http://localhost:8080 > tunnel_terminal.log 2>&1 &
          sleep 3
          cloudflared tunnel --url http://localhost:8081 > tunnel_files.log 2>&1 &
          sleep 3

          # Lấy URL
          TERMINAL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' tunnel_terminal.log | head -1)
          FILES_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' tunnel_files.log | head -1)

          echo "=============================================="
          echo "✅ VPS tạm thời đã sẵn sàng!"
          echo ""
          echo "🌐 Terminal:    $TERMINAL_URL"
          echo "📁 File Manager: $FILES_URL"
          if [ -n "${{ github.event.inputs.terminal_user }}" ]; then
            echo "👤 Đăng nhập: ${{ github.event.inputs.terminal_user }}"
            echo "🔑 Mật khẩu: ${{ github.event.inputs.terminal_password }}"
          fi
          echo ""
          echo "⏱️  Tồn tại tối đa: ${{ github.event.inputs.max_runtime }} phút"
          echo "=============================================="

          # Giữ VPS sống
          SLEEP_SECONDS=$(( ${{ github.event.inputs.max_runtime }} * 60 - 120 ))
          if [ $SLEEP_SECONDS -gt 0 ]; then
            sleep $SLEEP_SECONDS
          fi
          echo "🛑 Hết thời gian, VPS sẽ bị hủy."
