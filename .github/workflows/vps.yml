name: Temporary VPS (Tailscale - All Platforms)

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: '💻 Hệ điều hành'
        required: true
        default: 'ubuntu-24.04'
        type: choice
        options:
          - 'ubuntu-20.04'
          - 'ubuntu-22.04'
          - 'ubuntu-24.04'
          - 'windows-latest'
          - 'windows-2022'
          - 'macos-latest'
          - 'macos-13'
      connection_type:
        description: '🌐 Giao thức (SSH/RDP/VNC)'
        required: true
        default: 'ssh'
        type: choice
        options:
          - 'ssh'
          - 'rdp'
          - 'vnc'
      ssh_user:
        description: '👤 Username'
        required: true
        default: 'runner'
      ssh_password:
        description: '🔑 Password (Windows yêu cầu phức tạp)'
        required: true
        default: 'Vps@Secure2026!'
      enable_root_ssh:
        description: '🚀 Cho phép root/runneradmin?'
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      ssh_port:
        description: '🔌 SSH port (chỉ dùng cho Linux SSH)'
        required: true
        default: '22'
      timezone:
        description: '🕒 Múi giờ'
        required: true
        default: 'UTC'
      max_runtime:
        description: '⏱️ Max runtime (minutes, max 350)'
        required: true
        default: '330'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '330'
          - '350'

jobs:
  vps:
    runs-on: ${{ github.event.inputs.runner_os }}
    timeout-minutes: 350

    steps:
      - name: Check runtime
        id: runtime
        shell: bash
        run: |
          MAX="${{ github.event.inputs.max_runtime }}"
          if [ "$MAX" -gt 350 ]; then MAX=350; fi
          echo "max=$MAX" >> $GITHUB_OUTPUT

      # ==========================================
      # 🐧 LINUX SETUP (SSH & XRDP) + Tailscale
      # ==========================================
      - name: Setup Linux VPS
        if: runner.os == 'Linux'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          ENABLE_ROOT: ${{ github.event.inputs.enable_root_ssh }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          CONNECTION_TYPE: ${{ github.event.inputs.connection_type }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
          TAILSCALE_AUTHKEY: ${{ vars.TAILSCALE_AUTHKEY }}
          TIMEZONE: ${{ github.event.inputs.timezone }}
        run: |
          set -e
          sudo timedatectl set-timezone "$TIMEZONE" || true

          if [ "$ENABLE_ROOT" = "yes" ]; then
            echo "root:$SSH_PASS" | sudo chpasswd
          fi

          if id "$SSH_USER" &>/dev/null; then
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
          else
            sudo useradd -m -s /bin/bash "$SSH_USER"
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
            sudo usermod -aG sudo "$SSH_USER"
          fi
          echo "$SSH_USER ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/$SSH_USER

          if [ "$CONNECTION_TYPE" = "rdp" ] || [ "$CONNECTION_TYPE" = "vnc" ]; then
            echo ">>> Cài đặt XFCE Desktop và XRDP..."
            sudo apt update -qq
            sudo DEBIAN_FRONTEND=noninteractive apt install -y -qq xfce4 xfce4-goodies xrdp curl
            sudo systemctl enable xrdp
            sudo adduser xrdp ssl-cert
            echo xfce4-session > /home/$SSH_USER/.xsession
            sudo chown $SSH_USER:$SSH_USER /home/$SSH_USER/.xsession
            sudo systemctl restart xrdp
            LOCAL_PORT=3389
            PROT_NAME="RDP (qua Tailscale IP)"
          else
            echo ">>> Cấu hình SSH..."
            sudo apt update -qq && sudo apt install -y -qq openssh-server curl tmux
            sudo sed -i "s/^#Port 22/Port $SSH_PORT/" /etc/ssh/sshd_config
            sudo sed -i "s/^Port 22/Port $SSH_PORT/" /etc/ssh/sshd_config
            sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            sudo systemctl restart ssh
            LOCAL_PORT=$SSH_PORT
            PROT_NAME="SSH (qua Tailscale IP)"
          fi

          echo ">>> Cài đặt Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey "$TAILSCALE_AUTHKEY" --hostname "github-linux-${GITHUB_RUN_ID}" --accept-routes
          TAILSCALE_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV

          echo "=============================================="
          echo "✅ LINUX VPS SẴN SÀNG ($PROT_NAME)"
          echo "🖥️ OS: Ubuntu (${{ github.event.inputs.runner_os }})"
          echo "👤 User: $SSH_USER"
          echo "🔑 Pass: $SSH_PASS"
          echo "🛜 Tailscale IP: $TAILSCALE_IP"
          echo "📌 Kết nối: $PROT_NAME - dùng IP $TAILSCALE_IP"
          echo "=============================================="

          for ((i=MAX_MINUTES; i>0; i--)); do echo "⏱️ $i phút..."; sleep 60; done

      # ==========================================
      # 🪟 WINDOWS SETUP (RDP/SSH) + Tailscale
      # ==========================================
      - name: Setup Windows VPS
        if: runner.os == 'Windows'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          ENABLE_ROOT: ${{ github.event.inputs.enable_root_ssh }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          CONNECTION_TYPE: ${{ github.event.inputs.connection_type }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
          TAILSCALE_AUTHKEY: ${{ vars.TAILSCALE_AUTHKEY }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Tạo user
          $Password = ConvertTo-SecureString $env:SSH_PASS -AsPlainText -Force
          if ($env:ENABLE_ROOT -eq "yes") {
              $TargetUser = "runneradmin"
          } else {
              $TargetUser = $env:SSH_USER
          }
          try {
              if (Get-LocalUser -Name $TargetUser -ErrorAction SilentlyContinue) {
                  Set-LocalUser -Name $TargetUser -Password $Password
              } else {
                  New-LocalUser -Name $TargetUser -Password $Password -FullName $TargetUser -Description "VPS User"
                  Add-LocalGroupMember -Group "Administrators" -Member $TargetUser
              }
          } catch {
              Write-Host "❌ LỖI TẠO USER: Mật khẩu không đủ mạnh hoặc vi phạm chính sách Windows!"
              exit 1
          }

          if ($env:CONNECTION_TYPE -eq 'rdp' -or $env:CONNECTION_TYPE -eq 'vnc') {
            # Bật RDP, tắt NLA
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
            Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
            Restart-Service TermService -Force -ErrorAction SilentlyContinue
            $LocalPort = 3389
            $ProtName = "RDP"
          } else {
            Start-Service sshd
            Set-Service -Name sshd -StartupType 'Automatic'
            $config = "$env:ProgramData\ssh\sshd_config"
            (Get-Content $config) -replace '^#?Port .*', "Port $env:SSH_PORT" | Set-Content $config
            Restart-Service sshd
            New-NetFirewallRule -Name "SSH" -DisplayName "SSH" -Direction Inbound -Protocol TCP -Action Allow -LocalPort $env:SSH_PORT
            $LocalPort = $env:SSH_PORT
            $ProtName = "SSH"
          }

          # Cài Tailscale (dùng chocolatey)
          choco install tailscale -y --no-progress | Out-Null
          # Khởi động dịch vụ và đăng nhập
          Start-Process "tailscale" -ArgumentList "up --authkey $env:TAILSCALE_AUTHKEY --hostname github-windows-$env:GITHUB_RUN_ID" -NoNewWindow -Wait
          $TailscaleIP = (tailscale ip -4).Trim()
          Write-Host "=============================================="
          Write-Host "✅ WINDOWS VPS SẴN SÀNG ($ProtName)"
          Write-Host "🖥️ OS: Windows (${{ github.event.inputs.runner_os }})"
          Write-Host "👤 User: $TargetUser"
          Write-Host "🔑 Pass: $env:SSH_PASS"
          Write-Host "🛜 Tailscale IP: $TailscaleIP"
          Write-Host "📌 Kết nối $ProtName đến $TailscaleIP"
          Write-Host "=============================================="

          $MaxMinutes = [int]$env:MAX_MINUTES
          for ($i = $MaxMinutes; $i -gt 0; $i--) { Write-Host "⏱️ $i phút..."; Start-Sleep -Seconds 60 }

      # ==========================================
      # 🍎 macOS SETUP (SSH & VNC) + Tailscale
      # ==========================================
      - name: Setup macOS VPS
        if: runner.os == 'macOS'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          CONNECTION_TYPE: ${{ github.event.inputs.connection_type }}
          SSH_PORT: ${{ github.event.inputs.ssh_port }}
          MAX_MINUTES: ${{ steps.runtime.outputs.max }}
          TAILSCALE_AUTHKEY: ${{ vars.TAILSCALE_AUTHKEY }}
        run: |
          set -e

          if ! id "$SSH_USER" &>/dev/null; then
              sudo sysadminctl -addUser "$SSH_USER" -password "$SSH_PASS" -admin
          else
              sudo dscl . -passwd /Users/"$SSH_USER" "$SSH_PASS"
          fi

          if [ "$CONNECTION_TYPE" = "rdp" ] || [ "$CONNECTION_TYPE" = "vnc" ]; then
              echo ">>> Bật Screen Sharing (VNC)..."
              sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
              sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -allowAccessFor -specifiedUsers
              sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -users "$SSH_USER" -access -on -privs -all
              LOCAL_PORT=5900
              PROT_NAME="VNC (qua Tailscale IP)"
          else
              sudo systemsetup -setremotelogin on
              LOCAL_PORT=22
              PROT_NAME="SSH (qua Tailscale IP)"
          fi

          # Cài Tailscale
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey "$TAILSCALE_AUTHKEY" --hostname "github-macos-${GITHUB_RUN_ID}" --accept-routes
          TAILSCALE_IP=$(tailscale ip -4)

          echo "=============================================="
          echo "✅ macOS VPS SẴN SÀNG ($PROT_NAME)"
          echo "🖥️ OS: macOS (${{ github.event.inputs.runner_os }})"
          echo "👤 User: $SSH_USER"
          echo "🔑 Pass: $SSH_PASS"
          echo "🛜 Tailscale IP: $TAILSCALE_IP"
          echo "📌 Kết nối $PROT_NAME đến $TAILSCALE_IP"
          echo "=============================================="

          for ((i=MAX_MINUTES; i>0; i--)); do echo "⏱️ $i phút..."; sleep 60; done
