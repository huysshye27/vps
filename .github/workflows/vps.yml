name: Temporary VPS (SSH via localhost.run)

on:
  workflow_dispatch:
    inputs:
      ssh_user:
        description: 'SSH username'
        required: true
        default: 'runner'
      ssh_password:
        description: 'SSH password'
        required: true
        default: 'MySecurePass123'
      max_runtime:
        description: 'Max runtime (minutes, max 350)'
        required: true
        default: '330'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '330'
          - '350'

jobs:
  vps:
    runs-on: ubuntu-24.04
    timeout-minutes: 350

    steps:
      - name: Check runtime
        id: runtime
        run: |
          MAX=${{ github.event.inputs.max_runtime }}
          if [ "$MAX" -gt 350 ]; then MAX=350; fi
          echo "max=$MAX" >> $GITHUB_OUTPUT

      - name: Setup SSH and start tunnel
        run: |
          set -e  # Dừng ngay nếu có lỗi
          echo ">>> Bắt đầu cài đặt..."
          sudo apt update -qq && sudo apt install -y -qq openssh-server curl

          SSH_USER="${{ github.event.inputs.ssh_user }}"
          SSH_PASS="${{ github.event.inputs.ssh_password }}"

          echo ">>> Tạo/cập nhật user $SSH_USER..."
          if id "$SSH_USER" &>/dev/null; then
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
          else
            sudo useradd -m -s /bin/bash "$SSH_USER"
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
            sudo usermod -aG sudo "$SSH_USER"
          fi

          echo ">>> Cấu hình SSH..."
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

          echo ">>> Tạo tunnel localhost.run..."
          mkdir -p /tmp/sshkey
          ssh-keygen -t rsa -f /tmp/sshkey/id_rsa -N "" -q
          chmod 600 /tmp/sshkey/id_rsa

          nohup ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
            -R 0:localhost:22 \
            -i /tmp/sshkey/id_rsa \
            nokey@localhost.run > /tmp/lhr.log 2>&1 &
          LHR_PID=$!
          echo "Tunnel PID: $LHR_PID"

          sleep 8
          LHR_PORT=$(grep -oP 'localhost\.run:\K[0-9]+' /tmp/lhr.log | head -1)

          if [ -z "$LHR_PORT" ]; then
            echo ">>> LỖI: Không lấy được cổng. Log tunnel:"
            cat /tmp/lhr.log
            exit 1
          fi

          echo "=============================================="
          echo "✅ VPS đã sẵn sàng!"
          echo ""
          echo "ssh -p $LHR_PORT $SSH_USER@localhost.run"
          echo "Password: $SSH_PASS"
          echo "⏱️ Tồn tại tối đa: ${{ steps.runtime.outputs.max }} phút"
          echo "=============================================="

          echo ">>> Giữ VPS sống..."
          SLEEP_SEC=$(( ${{ steps.runtime.outputs.max }} * 60 - 30 ))
          if [ $SLEEP_SEC -gt 0 ]; then
            sleep $SLEEP_SEC
          fi
          echo ">>> Hết thời gian, kết thúc."
