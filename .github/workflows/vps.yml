name: Temporary VPS (SSH via bore)

on:
  workflow_dispatch:
    inputs:
      ssh_user:
        description: '👤 SSH username'
        required: true
        default: 'runner'
      ssh_password:
        description: '🔑 SSH password'
        required: true
        default: 'MySecurePass123'
      max_runtime:
        description: '⏱️ Max runtime (minutes, max 350)'
        required: true
        default: '330'
        type: choice
        options:
          - '60'
          - '120'
          - '180'
          - '240'
          - '300'
          - '330'
          - '350'

jobs:
  vps:
    runs-on: ubuntu-24.04
    timeout-minutes: 350

    steps:
      - name: Check runtime limit
        id: runtime
        run: |
          MAX=${{ github.event.inputs.max_runtime }}
          if [ "$MAX" -gt 350 ]; then MAX=350; fi
          echo "max=$MAX" >> $GITHUB_OUTPUT

      - name: Setup environment (SSH + bore)
        run: |
          # Cài đặt công cụ cần thiết (nhanh nhất có thể)
          sudo apt update -qq && sudo apt install -y -qq openssh-server curl wget

          # Tải bore (TCP tunnel miễn phí, không giới hạn)
          wget -q "https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz" -O bore.tar.gz
          tar xzf bore.tar.gz
          sudo mv bore /usr/local/bin/

          # Tạo user và cấu hình SSH
          SSH_USER="${{ github.event.inputs.ssh_user }}"
          SSH_PASS="${{ github.event.inputs.ssh_password }}"

          if id "$SSH_USER" &>/dev/null; then
            echo "ℹ️ User $SSH_USER exists, resetting password..."
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
          else
            sudo useradd -m -s /bin/bash "$SSH_USER"
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
            sudo usermod -aG sudo "$SSH_USER"
          fi

          # Bật xác thực bằng mật khẩu
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Start bore tunnel & show connection
        run: |
          # Mở tunnel TCP port 22 đến bore.pub
          bore local 22 --to bore.pub > bore.log 2>&1 &
          sleep 5

          BORE_PORT=$(grep -oP 'bore\.pub:\K[0-9]+' bore.log | head -1)
          if [ -z "$BORE_PORT" ]; then
            echo "❌ Failed to get bore port. Log:"
            cat bore.log
            exit 1
          fi

          echo "=============================================="
          echo "✅ VPS is ready!"
          echo ""
          echo "💻 SSH command:"
          echo "   ssh -p $BORE_PORT ${{ github.event.inputs.ssh_user }}@bore.pub"
          echo ""
          echo "🔑 Password: ${{ github.event.inputs.ssh_password }}"
          echo "⏱️  Max runtime: ${{ steps.runtime.outputs.max }} minutes"
          echo "=============================================="

      - name: Keep alive until time expires
        run: |
          MAX=${{ steps.runtime.outputs.max }}
          SLEEP_SEC=$(( MAX * 60 - 60 ))   # trừ 1 phút để dọn dẹp
          if [ $SLEEP_SEC -gt 0 ]; then
            sleep $SLEEP_SEC
          fi
          echo "🛑 Time's up. VPS will be destroyed."
