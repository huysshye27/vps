name: Terraria Master (Auto-Start & Persistent)

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: '💻 Hệ điều hành'
        required: true
        default: 'ubuntu-24.04'
        type: choice
        options:
          - 'ubuntu-24.04'
          - 'ubuntu-22.04'
          - 'windows-latest'
          - 'windows-2022'
      server_download_url:
        description: '🔗 Link tải Server (Hỗ trợ Vanilla, TShock, tModLoader file zip)'
        required: true
        default: 'https://terraria.org/api/download/pc-dedicated-server/terraria-server-1449.zip'
      connection_type:
        description: '🌐 Quản trị (SSH = Dòng lệnh, RDP = Giao diện)'
        required: true
        default: 'ssh'
        type: choice
        options:
          - 'ssh'
          - 'rdp'
      ssh_user:
        description: '👤 Username quản trị'
        required: true
        default: 'serveradmin'
      ssh_password:
        description: '🔑 Password quản trị'
        required: true
        default: 'GameServer@2026!'
      max_runtime:
        description: '⏱️ Thời gian treo (phút)'
        required: true
        default: '330'
        type: choice
        options:
          - '60'
          - '120'
          - '240'
          - '330'
          - '350'
      auto_rerun:
        description: '🔄 Tự động nối phiên chạy (Khi hết giờ)?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  actions: write
  contents: read

jobs:
  game_vps:
    runs-on: ${{ github.event.inputs.runner_os }}
    timeout-minutes: 350

    steps:
      - name: 📥 Phục hồi World & Config cũ
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p ./server_data/Worlds
          echo ">>> Đang quét tìm dữ liệu thế giới từ phiên chạy trước..."
          # Tìm Run ID thành công gần nhất của workflow này
          LAST_RUN_ID=$(gh run list --workflow="${{ github.workflow }}" --status completed --limit 1 --json databaseId -q '.[0].databaseId' || true)
          if [ ! -z "$LAST_RUN_ID" ]; then
            gh run download $LAST_RUN_ID --name "terraria-data" --dir ./server_data || echo "Không tìm thấy dữ liệu. Khởi tạo World mới."
          else
            echo "Khởi tạo dữ liệu sạch."
          fi

      # ==========================================
      # 🐧 XỬ LÝ TRÊN LINUX (TMUX)
      # ==========================================
      - name: 🐧 Setup & Start Linux Server
        if: runner.os == 'Linux'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          CONNECTION_TYPE: ${{ github.event.inputs.connection_type }}
          DOWNLOAD_URL: ${{ github.event.inputs.server_download_url }}
          MAX_MINUTES: ${{ github.event.inputs.max_runtime }}
          TAILSCALE_KEY: ${{ vars.TAILSCALE_AUTHKEY }}
        run: |
          set -e
          sudo useradd -m -s /bin/bash "$SSH_USER" && echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
          sudo usermod -aG sudo "$SSH_USER" && echo "$SSH_USER ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/$SSH_USER

          sudo apt update -qq && sudo apt install -y -qq curl jq unzip tmux openssh-server
          sudo systemctl restart ssh

          if [ "$CONNECTION_TYPE" = "rdp" ]; then
            sudo DEBIAN_FRONTEND=noninteractive apt install -y -qq xfce4 xrdp
            sudo systemctl enable xrdp && sudo systemctl restart xrdp
          fi

          echo ">>> Tải & Giải nén Game Server..."
          mkdir -p ./terraria_server
          curl -sSL -o server.zip "$DOWNLOAD_URL"
          unzip -q server.zip -d ./terraria_server
          
          # Tự động dò tìm thư mục Linux bên trong file zip
          LINUX_DIR=$(find ./terraria_server -type d -name "Linux" | head -n 1)
          if [ -z "$LINUX_DIR" ]; then LINUX_DIR="./terraria_server"; fi
          
          cd "$LINUX_DIR"
          chmod +x TerrariaServer.bin.x86_64 || true
          chmod +x TerrariaServer || true

          # Tự động Start Server trong Tmux (Chạy ngầm)
          EXEC_FILE=$(ls | grep -E "^TerrariaServer(\.bin\.x86_64)?$" | head -n 1)
          echo ">>> Đang khởi động $EXEC_FILE trong Tmux..."
          tmux new-session -d -s terraria "./$EXEC_FILE -worldpath $GITHUB_WORKSPACE/server_data/Worlds -world $GITHUB_WORKSPACE/server_data/Worlds/GithubWorld.wld -autocreate 2 -port 7777"

          echo ">>> Thiết lập mạng ảo..."
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey="$TAILSCALE_KEY" --hostname="gh-linux-gameserver"
          TS_IP=$(tailscale ip -4)

          echo "=============================================="
          echo "✅ SERVER GAME ĐÃ CHẠY NGẦM!"
          echo "🌐 IP Kết nối Game: $TS_IP:7777"
          echo "💻 IP SSH/RDP: $TS_IP"
          echo "👤 User: $SSH_USER | 🔑 Pass: $SSH_PASS"
          echo "👉 Mẹo: SSH vào VPS và gõ 'tmux attach -t terraria' để xem bảng điều khiển game."
          echo "=============================================="

          for ((i=MAX_MINUTES; i>0; i--)); do echo "⏱️ Còn $i phút..."; sleep 60; done

      # ==========================================
      # 🪟 XỬ LÝ TRÊN WINDOWS (BACKGROUND)
      # ==========================================
      - name: 🪟 Setup & Start Windows Server
        if: runner.os == 'Windows'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          CONNECTION_TYPE: ${{ github.event.inputs.connection_type }}
          DOWNLOAD_URL: ${{ github.event.inputs.server_download_url }}
          MAX_MINUTES: ${{ github.event.inputs.max_runtime }}
          TAILSCALE_KEY: ${{ vars.TAILSCALE_AUTHKEY }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Password = ConvertTo-SecureString $env:SSH_PASS -AsPlainText -Force
          New-LocalUser -Name $env:SSH_USER -Password $Password -FullName $env:SSH_USER -Description "Admin"
          Add-LocalGroupMember -Group "Administrators" -Member $env:SSH_USER

          if ($env:CONNECTION_TYPE -eq 'rdp') {
              Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
              Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          } else {
              Start-Service sshd; Set-Service -Name sshd -StartupType 'Automatic'
          }

          Write-Host ">>> Tải & Giải nén Game Server..."
          New-Item -ItemType Directory -Force -Path .\terraria_server | Out-Null
          Invoke-WebRequest -Uri $env:DOWNLOAD_URL -OutFile server.zip
          Expand-Archive -Path server.zip -DestinationPath .\terraria_server -Force

          $WinDir = Get-ChildItem -Path .\terraria_server -Recurse -Directory -Filter "Windows" | Select-Object -First 1
          if (-not $WinDir) { $WinDir = Get-Item .\terraria_server }
          Set-Location $WinDir.FullName

          Write-Host ">>> Đang khởi động Terraria Server dưới nền..."
          $Args = "-worldpath $env:GITHUB_WORKSPACE\server_data\Worlds -world $env:GITHUB_WORKSPACE\server_data\Worlds\GithubWorld.wld -autocreate 2 -port 7777"
          Start-Process -FilePath "TerrariaServer.exe" -ArgumentList $Args -WindowStyle Hidden

          Write-Host ">>> Thiết lập mạng ảo..."
          choco install tailscale -y --no-progress | Out-Null
          Start-Sleep -Seconds 5
          $env:Path += ";C:\Program Files\Tailscale"
          tailscale up --authkey=$env:TAILSCALE_KEY --hostname="gh-windows-gameserver"
          $TsIp = tailscale ip -4

          Write-Host "=============================================="
          Write-Host "✅ SERVER GAME ĐÃ CHẠY NGẦM!"
          Write-Host "🌐 IP Kết nối Game: $TsIp:7777"
          Write-Host "=============================================="

          $MaxMinutes = [int]$env:MAX_MINUTES
          for ($i = $MaxMinutes; $i -gt 0; $i--) { Write-Host "⏱️ Còn $i phút..."; Start-Sleep -Seconds 60 }

      # ==========================================
      # 💾 LƯU DỮ LIỆU & TỰ ĐỘNG CHẠY TIẾP
      # ==========================================
      - name: 💾 Upload Artifacts (Ghi đè bản mới)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraria-data
          path: ./server_data
          overwrite: true
          retention-days: 2

      - name: 🔄 Trigger Auto Re-run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_RERUN: ${{ github.event.inputs.auto_rerun }}
        shell: bash
        run: |
          if [ "$AUTO_RERUN" = "yes" ] && [ "${{ github.run_attempt }}" -lt 50 ]; then
            echo ">>> Đang kích hoạt luồng chạy mới nối tiếp..."
            gh workflow run "${{ github.workflow }}" --ref "${{ github.ref }}" \
              -f runner_os="${{ github.event.inputs.runner_os }}" \
              -f server_download_url="${{ github.event.inputs.server_download_url }}" \
              -f connection_type="${{ github.event.inputs.connection_type }}" \
              -f ssh_user="${{ github.event.inputs.ssh_user }}" \
              -f ssh_password="${{ github.event.inputs.ssh_password }}" \
              -f max_runtime="${{ github.event.inputs.max_runtime }}" \
              -f auto_rerun="yes"
          fi
