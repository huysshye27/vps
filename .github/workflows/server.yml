name: Terraria Master (Pinggy Tunnel & Cache)

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: '💻 Hệ điều hành'
        required: true
        default: 'ubuntu-24.04'
        type: choice
        options:
          - 'ubuntu-24.04'
          - 'windows-latest'
      server_type:
        description: '🎮 Loại Server'
        required: true
        default: 'Vanilla'
        options: ['Vanilla', 'TShock', 'tModLoader']
      terraria_version:
        description: '🏷️ Phiên bản'
        required: true
        default: '1.4.5.6'
        type: string
      ssh_user:
        description: '👤 Username'
        required: true
        default: 'serveradmin'
      ssh_password:
        description: '🔑 Mật khẩu'
        required: true
        default: 'GameServer@2026!'
      max_runtime:
        description: '⏱️ Thời gian treo (phút)'
        required: true
        default: '330'
        options: ['60', '120', '240', '330', '350']
      auto_rerun:
        description: '🔄 Tự động nối phiên chạy?'
        required: true
        default: 'yes'
        options: ['yes', 'no']

jobs:
  game_vps:
    runs-on: ${{ github.event.inputs.runner_os }}
    timeout-minutes: 350

    steps:
      # Sử dụng Cache thay vì Artifact để lưu World
      - name: 📥 Phục hồi World & Config cũ
        uses: actions/cache@v4
        with:
          path: ./server_data
          key: terraria-persist-data

      - name: 🐧 Setup & Start Linux Server
        if: runner.os == 'Linux'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          SERVER_TYPE: ${{ github.event.inputs.server_type }}
          SERVER_VER: ${{ github.event.inputs.terraria_version }}
          MAX_MINUTES: ${{ github.event.inputs.max_runtime }}
        run: |
          set -e
          # Cấu hình Root/User
          sudo useradd -m -s /bin/bash "$SSH_USER"
          echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
          sudo usermod -aG sudo "$SSH_USER"
          echo "$SSH_USER ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/$SSH_USER
          
          sudo apt update -qq && sudo apt install -y -qq curl jq unzip tmux openssh-server
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

          # Tải Game
          mkdir -p ./terraria_server ./server_data/Worlds
          if [ "$SERVER_TYPE" == "Vanilla" ]; then
             URL="https://terraria.org/api/download/pc-dedicated-server/terraria-server-$(echo $SERVER_VER | tr -d '.').zip"
          elif [ "$SERVER_TYPE" == "TShock" ]; then
             URL=$(curl -s https://api.github.com/repos/Pryaxis/TShock/releases | jq -r "[.[] | select(.name | contains(\"$SERVER_VER\"))][0].assets[] | select(.name | endswith(\".zip\")).browser_download_url")
          else
             URL="https://github.com/tModLoader/tModLoader/releases/latest/download/tModLoader.zip"
          fi
          curl -sSL -o server.zip "$URL"
          unzip -q server.zip -d ./terraria_server
          cd $(find ./terraria_server -type d -name "Linux" | head -n 1 || echo "./terraria_server")
          chmod +x -R .

          # Chạy game ngầm
          EXEC=$(ls | grep -E "^TerrariaServer(\.bin\.x86_64)?$" | head -n 1)
          sudo -u "$SSH_USER" tmux new-session -d -s terraria "./$EXEC -worldpath $GITHUB_WORKSPACE/server_data/Worlds -world $GITHUB_WORKSPACE/server_data/Worlds/GithubWorld.wld -autocreate 2 -port 7777"

          # Tunnels bằng Pinggy
          echo ">>> Đang mở Public Port..."
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:7777 a.pinggy.io > game_port.log 2>&1 &
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:22 a.pinggy.io > ssh_port.log 2>&1 &
          sleep 5
          echo "=============================================="
          echo "✅ CỔNG KẾT NỐI (Copy các dòng dưới):"
          cat game_port.log | grep -o 'tcp://.*' || echo "Đang chờ port..."
          cat ssh_port.log | grep -o 'ssh .*' || echo "Đang chờ port..."
          echo "=============================================="
          sleep infinity

      - name: 🔄 Trigger Auto Re-run
        if: always()
        run: |
          if [ "${{ github.event.inputs.auto_rerun }}" == "yes" ]; then
            gh workflow run "${{ github.workflow }}" --ref "${{ github.ref }}" \
              -f runner_os="${{ github.event.inputs.runner_os }}" \
              -f server_type="${{ github.event.inputs.server_type }}" \
              -f terraria_version="${{ github.event.inputs.terraria_version }}" \
              -f ssh_user="${{ github.event.inputs.ssh_user }}" \
              -f ssh_password="${{ github.event.inputs.ssh_password }}" \
              -f max_runtime="${{ github.event.inputs.max_runtime }}" \
              -f auto_rerun="yes"
          fi
