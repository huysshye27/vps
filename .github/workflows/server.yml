name: Terraria

on:
  workflow_dispatch:
    inputs:
      relay_host:
        required: true
        default: kinetic.pikamc.vn
      relay_port:
        required: true
        default: "26499"
      world:
        required: true
        default: friends
      minutes:
        required: true
        default: "330"

permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip jq

      - name: Download TShock
        run: |
          mkdir -p server data/worlds data/config data/logs
          URL=$(curl -s https://api.github.com/repos/Pryaxis/TShock/releases/latest | jq -r '.assets[] | select(.name | test("linux-x64.*Release.zip$|linux-x64-Release.zip$")) | .browser_download_url' | head -n 1)
          curl -L "$URL" -o tshock.zip
          unzip -q tshock.zip -d server
          chmod +x server/TShock.Server

      - name: Start TShock
        run: |
          ./server/TShock.Server \
            -world "data/worlds/${{ inputs.world }}.wld" \
            -autocreate 1 \
            -port 7777 \
            -maxplayers 8 \
            -configpath data/config \
            -logpath data/logs > tshock.log 2>&1 &
          echo $! > tshock.pid
          sleep 10
          tail -n 80 tshock.log || true

      - name: Start tunnel
        run: |
          RELAY_HOST="${{ inputs.relay_host }}" \
          RELAY_PORT="${{ inputs.relay_port }}" \
          LOCAL_PORT=7777 \
          node server.js client > tunnel.log 2>&1 &
          echo $! > tunnel.pid
          sleep 5
          tail -n 80 tunnel.log || true

      - name: Run
        run: |
          echo "Connect Terraria to: ${{ inputs.relay_host }}:${{ inputs.relay_port }}"
          sleep $((${{ inputs.minutes }} * 60))

      - name: Stop
        if: always()
        run: |
          kill $(cat tunnel.pid) 2>/dev/null || true
          kill -INT $(cat tshock.pid) 2>/dev/null || true
          sleep 20
          kill $(cat tshock.pid) 2>/dev/null || true
          tail -n 100 tshock.log || true
          tail -n 100 tunnel.log || true

      - name: Save
        if: always()
        run: |
          git config user.name bot
          git config user.email bot@example.com
          git add data
          git commit -m save || exit 0
          git pull --rebase || true
          git push
