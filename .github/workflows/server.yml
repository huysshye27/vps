name: Terraria Master (Pinggy & Persistent)

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: '💻 Hệ điều hành'
        required: true
        default: 'ubuntu-24.04'
        type: choice
        options:
          - 'ubuntu-24.04'
          - 'ubuntu-22.04'
          - 'windows-latest'
          - 'windows-2022'
      server_type:
        description: '🎮 Loại Server'
        required: true
        default: 'Vanilla'
        type: choice
        options:
          - 'Vanilla'
          - 'TShock'
          - 'tModLoader'
      terraria_version:
        description: '🏷️ Phiên bản'
        required: true
        default: '1.4.5.6'
        type: string
      connection_type:
        description: '🌐 Giao thức'
        required: true
        default: 'ssh'
        type: choice
        options:
          - 'ssh'
          - 'rdp'
      ssh_user:
        description: '👤 Username'
        required: true
        default: 'serveradmin'
        type: string
      ssh_password:
        description: '🔑 Mật khẩu'
        required: true
        default: 'GameServer@2026!'
        type: string
      max_runtime:
        description: '⏱️ Thời gian treo (phút)'
        required: true
        default: '330'
        type: choice
        options:
          - '60'
          - '120'
          - '240'
          - '330'
          - '350'
      auto_rerun:
        description: '🔄 Tự động nối phiên chạy?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  actions: write
  contents: read

jobs:
  game_vps:
    runs-on: ${{ github.event.inputs.runner_os }}
    timeout-minutes: 350

    steps:
      - name: 📥 Phục hồi dữ liệu (Cache)
        uses: actions/cache@v4
        with:
          path: ./server_data
          key: terraria-data-${{ github.run_id }}
          restore-keys: |
            terraria-data-

      # ==========================================
      # 🐧 LINUX (TMUX + PINGGY)
      # ==========================================
      - name: 🐧 Linux Server
        if: runner.os == 'Linux'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
          SERVER_TYPE: ${{ github.event.inputs.server_type }}
          SERVER_VER: ${{ github.event.inputs.terraria_version }}
        run: |
          set -e
          sudo useradd -m -s /bin/bash "$SSH_USER"
          echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
          sudo usermod -aG sudo "$SSH_USER"
          echo "$SSH_USER ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/$SSH_USER

          sudo apt update -qq && sudo apt install -y -qq tmux openssh-server
          sudo systemctl restart ssh

          # Tải game... (Logic cũ)
          mkdir -p ./terraria_server
          if [ "$SERVER_TYPE" == "Vanilla" ]; then SHORT_VER=$(echo "$SERVER_VER" | tr -d '.'); URL="https://terraria.org/api/download/pc-dedicated-server/terraria-server-${SHORT_VER}.zip";
          elif [ "$SERVER_TYPE" == "TShock" ]; then URL=$(curl -s https://api.github.com/repos/Pryaxis/TShock/releases | jq -r "[.[] | select(.name | contains(\"$SERVER_VER\"))][0].assets[] | select(.name | endswith(\".zip\")).browser_download_url");
          else URL="https://github.com/tModLoader/tModLoader/releases/latest/download/tModLoader.zip"; fi
          curl -sSL -o server.zip "$URL" && unzip -q server.zip -d ./terraria_server
          cd $(find ./terraria_server -type d -name "Linux" | head -n 1) && chmod +x -R .

          # Khởi chạy
          sudo -u $SSH_USER tmux new-session -d -s terraria
          sudo -u $SSH_USER tmux send-keys -t terraria "./TerrariaServer.bin.x86_64 -worldpath $GITHUB_WORKSPACE/server_data/Worlds -world $GITHUB_WORKSPACE/server_data/Worlds/GithubWorld.wld -autocreate 2 -port 7777" C-m

          # Tunneling với Pinggy (SSH -p 443)
          echo ">>> Khởi tạo Tunnel..."
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:7777 a.pinggy.io > game_tunnel.log 2>&1 &
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:22 a.pinggy.io > ssh_tunnel.log 2>&1 &
          sleep 5
          echo "=============================================="
          echo "🎮 GAME URL: $(grep -o 'tunnel.*' game_tunnel.log | head -1)"
          echo "💻 SSH URL: $(grep -o 'tunnel.*' ssh_tunnel.log | head -1)"
          echo "=============================================="
          sleep 330m

      # ==========================================
      # 🪟 WINDOWS
      # ==========================================
      - name: 🪟 Windows Server
        if: runner.os == 'Windows'
        env:
          SSH_USER: ${{ github.event.inputs.ssh_user }}
          SSH_PASS: ${{ github.event.inputs.ssh_password }}
        shell: pwsh
        run: |
          # Setup User & Server (Logic cũ)
          $Password = ConvertTo-SecureString $env:SSH_PASS -AsPlainText -Force
          New-LocalUser -Name $env:SSH_USER -Password $Password -FullName $env:SSH_USER -Description "Admin" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member $env:SSH_USER
          
          # Tunneling với Pinggy
          Start-Process -FilePath "ssh" -ArgumentList "-o StrictHostKeyChecking=no -p 443 -R0:localhost:7777 a.pinggy.io" -WindowStyle Hidden
          Start-Process -FilePath "ssh" -ArgumentList "-o StrictHostKeyChecking=no -p 443 -R0:localhost:22 a.pinggy.io" -WindowStyle Hidden
          Write-Host ">>> Tunnel đang chạy. Kiểm tra logs để lấy URL."
          sleep 330m

      - name: 🔄 Re-run
        if: always()
        run: |
          if [ "${{ github.event.inputs.auto_rerun }}" == "yes" ]; then
            gh workflow run "${{ github.workflow }}" -f runner_os="${{ github.event.inputs.runner_os }}" ... (các input khác)
          fi
