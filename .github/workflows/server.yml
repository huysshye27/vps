name: Terraria Server - Playit + Ngrok Admin

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: "Runner OS"
        required: true
        default: "ubuntu-24.04"
        type: choice
        options:
          - "ubuntu-20.04"
          - "ubuntu-22.04"
          - "ubuntu-24.04"

      server_type:
        description: "Server type"
        required: true
        default: "tshock"
        type: choice
        options:
          - "vanilla"
          - "tshock"
          - "tmodloader"

      force_reinstall:
        description: "Reinstall server runtime"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      tshock_version:
        description: "TShock version: latest or tag like v6.1.0"
        required: true
        default: "latest"

      tmodloader_version:
        description: "tModLoader version: latest or tag like v2026.05.3.0"
        required: true
        default: "latest"

      vanilla_version:
        description: "Vanilla server version number for terraria-server-XXXX.zip, example: 1456"
        required: true
        default: "1456"

      vanilla_download_url:
        description: "Optional custom vanilla server zip URL. Leave empty to use terraria.org version URL"
        required: false
        default: ""

      world_name:
        description: "World name"
        required: true
        default: "friends"

      world_seed:
        description: "Custom world seed, empty = random. Only applies when creating a new world."
        required: false
        default: ""

      world_size:
        description: "World size: 1=Small, 2=Medium, 3=Large"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"

      difficulty:
        description: "Difficulty: 0=Classic, 1=Expert, 2=Master, 3=Journey"
        required: true
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"

      max_players:
        description: "Max players"
        required: true
        default: "8"

      server_password:
        description: "Terraria server password, empty = no password"
        required: false
        default: ""

      local_port:
        description: "Local Terraria port inside runner"
        required: true
        default: "7777"

      connection_type:
        description: "Admin connection by ngrok"
        required: true
        default: "ssh"
        type: choice
        options:
          - "none"
          - "ssh"
          - "rdp"

      ssh_user:
        description: "SSH/RDP username"
        required: true
        default: "runner"

      ssh_password:
        description: "SSH/RDP password"
        required: true
        default: "Vps@Secure2026!"

      enable_root_ssh:
        description: "Enable root password SSH"
        required: true
        default: "no"
        type: choice
        options:
          - "yes"
          - "no"

      ssh_port:
        description: "SSH port"
        required: true
        default: "22"

      timezone:
        description: "Timezone"
        required: true
        default: "Asia/Ho_Chi_Minh"

      run_minutes:
        description: "Runtime minutes, max safe 330"
        required: true
        default: "330"
        type: choice
        options:
          - "60"
          - "120"
          - "180"
          - "240"
          - "300"
          - "330"

      auto_restart:
        description: "Auto trigger next run after normal success only"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  actions: write

concurrency:
  group: terraria-server-playit-ngrok
  cancel-in-progress: false

jobs:
  terraria:
    runs-on: ${{ inputs.runner_os }}
    timeout-minutes: 355

    env:
      BASE_DIR: data
      SERVER_DIR: data/server
      RUNTIME_DIR: data/server/runtime
      WORLD_DIR: data/server/worlds
      LOG_DIR: data/server/logs
      TSHOCK_CONFIG_DIR: data/server/tshock
      PLAYIT_DIR: data/playit
      CONFIG_FILE: data/server/serverconfig.txt
      PLAYIT_SECRET_KEY: ${{ secrets.PLAYIT_SECRET_KEY || vars.PLAYIT_SECRET_KEY }}
      NGROK_TOKEN: ${{ vars.NGROK_AUTH_TOKEN || secrets.NGROK_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print job info
        run: |
          echo "============================================================"
          echo "JOB INFO"
          echo "============================================================"
          echo "Repository: ${{ github.repository }}"
          echo "Branch/ref: ${{ github.ref }}"
          echo "Ref name: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run number: ${{ github.run_number }}"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo
          echo "============================================================"
          echo "INPUTS"
          echo "============================================================"
          echo "runner_os=${{ inputs.runner_os }}"
          echo "server_type=${{ inputs.server_type }}"
          echo "force_reinstall=${{ inputs.force_reinstall }}"
          echo "tshock_version=${{ inputs.tshock_version }}"
          echo "tmodloader_version=${{ inputs.tmodloader_version }}"
          echo "vanilla_version=${{ inputs.vanilla_version }}"
          echo "vanilla_download_url=${{ inputs.vanilla_download_url }}"
          echo "world_name=${{ inputs.world_name }}"
          echo "world_seed=${{ inputs.world_seed }}"
          echo "world_size=${{ inputs.world_size }}"
          echo "difficulty=${{ inputs.difficulty }}"
          echo "max_players=${{ inputs.max_players }}"
          echo "local_port=${{ inputs.local_port }}"
          echo "connection_type=${{ inputs.connection_type }}"
          echo "ssh_user=${{ inputs.ssh_user }}"
          echo "ssh_port=${{ inputs.ssh_port }}"
          echo "enable_root_ssh=${{ inputs.enable_root_ssh }}"
          echo "timezone=${{ inputs.timezone }}"
          echo "run_minutes=${{ inputs.run_minutes }}"
          echo "auto_restart=${{ inputs.auto_restart }}"
          echo "STOP_TERRARIA_RESTART=${{ vars.STOP_TERRARIA_RESTART }}"
          if [ -n "${{ inputs.server_password }}" ]; then
            echo "server_password=set"
          else
            echo "server_password=empty"
          fi
          if [ -n "$PLAYIT_SECRET_KEY" ]; then
            echo "PLAYIT_SECRET_KEY=set"
          else
            echo "PLAYIT_SECRET_KEY=not set, first-run claim link mode"
          fi
          if [ -n "$NGROK_TOKEN" ]; then
            echo "NGROK_TOKEN=set"
          else
            echo "NGROK_TOKEN=missing"
          fi
          echo
          echo "============================================================"
          echo "SYSTEM"
          echo "============================================================"
          uname -a
          whoami
          id
          pwd
          node -v || true
          npm -v || true
          docker --version || true
          tmux -V || true
          df -h
          free -h

      - name: Validate inputs
        run: |
          set -e

          if [ "${{ inputs.connection_type }}" != "none" ] && [ -z "$NGROK_TOKEN" ]; then
            echo "ERROR: Missing NGROK token."
            echo "Set vars.NGROK_AUTH_TOKEN or secrets.NGROK_AUTH_TOKEN"
            exit 1
          fi

          RUN_MINUTES="${{ inputs.run_minutes }}"
          if ! echo "$RUN_MINUTES" | grep -Eq '^[0-9]+$'; then
            echo "ERROR: run_minutes must be number"
            exit 1
          fi

          if [ "$RUN_MINUTES" -gt 330 ]; then
            echo "ERROR: use run_minutes <= 330"
            exit 1
          fi

          LOCAL_PORT="${{ inputs.local_port }}"
          if ! echo "$LOCAL_PORT" | grep -Eq '^[0-9]+$'; then
            echo "ERROR: local_port must be number"
            exit 1
          fi

          MAX_PLAYERS="${{ inputs.max_players }}"
          if ! echo "$MAX_PLAYERS" | grep -Eq '^[0-9]+$'; then
            echo "ERROR: max_players must be number"
            exit 1
          fi

      - name: Install packages
        run: |
          set -e
          sudo timedatectl set-timezone "${{ inputs.timezone }}" || true
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            curl \
            unzip \
            jq \
            tar \
            findutils \
            procps \
            net-tools \
            lsof \
            file \
            ca-certificates \
            openssh-server \
            tmux

      - name: Prepare folders
        run: |
          set -e
          mkdir -p "$BASE_DIR"
          mkdir -p "$SERVER_DIR"
          mkdir -p "$RUNTIME_DIR"
          mkdir -p "$WORLD_DIR"
          mkdir -p "$LOG_DIR"
          mkdir -p "$TSHOCK_CONFIG_DIR"
          mkdir -p "$PLAYIT_DIR"

          echo "============================================================"
          echo "INITIAL DATA TREE"
          echo "============================================================"
          find data -maxdepth 6 -type f | sort || true

      - name: Setup admin SSH or RDP
        if: ${{ inputs.connection_type != 'none' }}
        env:
          SSH_USER: ${{ inputs.ssh_user }}
          SSH_PASS: ${{ inputs.ssh_password }}
          ENABLE_ROOT: ${{ inputs.enable_root_ssh }}
          SSH_PORT: ${{ inputs.ssh_port }}
          CONNECTION_TYPE: ${{ inputs.connection_type }}
        run: |
          set -e

          echo "============================================================"
          echo "ADMIN ACCESS SETUP"
          echo "============================================================"

          if [ "$ENABLE_ROOT" = "yes" ]; then
            echo "root:$SSH_PASS" | sudo chpasswd
            sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config || true
          fi

          if id "$SSH_USER" >/dev/null 2>&1; then
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
          else
            sudo useradd -m -s /bin/bash "$SSH_USER"
            echo "$SSH_USER:$SSH_PASS" | sudo chpasswd
            sudo usermod -aG sudo "$SSH_USER"
          fi

          echo "$SSH_USER ALL=(ALL) NOPASSWD:ALL" | sudo tee "/etc/sudoers.d/$SSH_USER" >/dev/null

          if [ "$CONNECTION_TYPE" = "rdp" ]; then
            echo "Installing XFCE + XRDP..."
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xfce4 xfce4-goodies xrdp
            sudo systemctl enable xrdp || true
            sudo adduser xrdp ssl-cert || true
            echo xfce4-session | sudo tee "/home/$SSH_USER/.xsession" >/dev/null
            sudo chown "$SSH_USER:$SSH_USER" "/home/$SSH_USER/.xsession"
            sudo systemctl restart xrdp || true
            echo "ADMIN_PORT=3389" >> "$GITHUB_ENV"
            echo "ADMIN_PROTOCOL=RDP" >> "$GITHUB_ENV"
          else
            echo "Configuring SSH..."
            sudo sed -i "s/^#Port 22/Port $SSH_PORT/" /etc/ssh/sshd_config || true
            sudo sed -i "s/^Port 22/Port $SSH_PORT/" /etc/ssh/sshd_config || true
            sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
            sudo sed -i 's/^#*PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config || true
            sudo systemctl restart ssh || sudo service ssh restart || true
            echo "ADMIN_PORT=$SSH_PORT" >> "$GITHUB_ENV"
            echo "ADMIN_PROTOCOL=SSH" >> "$GITHUB_ENV"
          fi

      - name: Start ngrok for admin
        if: ${{ inputs.connection_type != 'none' }}
        run: |
          set -e

          echo "============================================================"
          echo "START NGROK ADMIN TUNNEL"
          echo "============================================================"

          curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xzf ngrok.tgz
          chmod +x ngrok

          ./ngrok config add-authtoken "$NGROK_TOKEN"
          nohup ./ngrok tcp "$ADMIN_PORT" --log=stdout > /tmp/ngrok.log 2>&1 &
          echo $! > /tmp/ngrok.pid

          sleep 8

          NGROK_URL="$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's#tcp://##')"

          echo "============================================================"
          echo "ADMIN READY"
          echo "============================================================"
          echo "Protocol: $ADMIN_PROTOCOL"
          echo "User: ${{ inputs.ssh_user }}"
          echo "Pass: ${{ inputs.ssh_password }}"
          echo "Address: $NGROK_URL"
          echo "============================================================"

          echo "NGROK_URL=$NGROK_URL" >> "$GITHUB_ENV"
          tail -n 100 /tmp/ngrok.log || true

      - name: Create server config
        run: |
          set -e

          WORLD_FILE="$WORLD_DIR/${{ inputs.world_name }}.wld"
          WORLD_SEED="${{ inputs.world_seed }}"

          cat > "$CONFIG_FILE" <<EOF
          world=$WORLD_FILE
          autocreate=${{ inputs.world_size }}
          worldname=${{ inputs.world_name }}
          difficulty=${{ inputs.difficulty }}
          maxplayers=${{ inputs.max_players }}
          port=${{ inputs.local_port }}
          password=${{ inputs.server_password }}
          motd=Temporary Terraria server on GitHub Actions
          secure=1
          language=en-US
          EOF

          if [ -n "$WORLD_SEED" ]; then
            printf 'seed=%s\n' "$WORLD_SEED" >> "$CONFIG_FILE"
          fi

          sed -i 's/^[[:space:]]*//' "$CONFIG_FILE"

          echo "============================================================"
          echo "SERVER CONFIG"
          echo "============================================================"
          cat "$CONFIG_FILE"

      - name: Decide install
        id: decide
        run: |
          set -e

          NEED_INSTALL="false"

          if [ "${{ inputs.force_reinstall }}" = "true" ]; then
            NEED_INSTALL="true"
          fi

          if [ ! -f "$SERVER_DIR/.server_type" ]; then
            NEED_INSTALL="true"
          fi

          OLD_TYPE="$(cat "$SERVER_DIR/.server_type" 2>/dev/null || true)"
          if [ "$OLD_TYPE" != "${{ inputs.server_type }}" ]; then
            NEED_INSTALL="true"
          fi

          case "${{ inputs.server_type }}" in
            tshock)
              if [ ! -f "$RUNTIME_DIR/TShock.Server" ]; then NEED_INSTALL="true"; fi
              ;;
            vanilla)
              if [ ! -f "$RUNTIME_DIR/TerrariaServer.bin.x86_64" ]; then NEED_INSTALL="true"; fi
              ;;
            tmodloader)
              if [ ! -f "$RUNTIME_DIR/start-tModLoaderServer.sh" ]; then NEED_INSTALL="true"; fi
              ;;
          esac

          echo "need_install=$NEED_INSTALL" >> "$GITHUB_OUTPUT"
          echo "NEED_INSTALL=$NEED_INSTALL"

      - name: Install vanilla server
        if: ${{ steps.decide.outputs.need_install == 'true' && inputs.server_type == 'vanilla' }}
        run: |
          set -e

          echo "============================================================"
          echo "INSTALL VANILLA TERRARIA SERVER"
          echo "============================================================"

          rm -rf "$RUNTIME_DIR"
          mkdir -p "$RUNTIME_DIR"

          if [ -n "${{ inputs.vanilla_download_url }}" ]; then
            URL="${{ inputs.vanilla_download_url }}"
          else
            URL="https://terraria.org/api/download/pc-dedicated-server/terraria-server-${{ inputs.vanilla_version }}.zip"
          fi

          echo "Download URL: $URL"
          curl -L "$URL" -o vanilla.zip

          echo "ZIP info:"
          ls -lh vanilla.zip
          unzip -l vanilla.zip | head -n 300

          rm -rf vanilla_extract
          mkdir -p vanilla_extract
          unzip -q vanilla.zip -d vanilla_extract

          BIN="$(find vanilla_extract -type f -path '*/Linux/TerrariaServer.bin.x86_64' | head -n 1)"

          if [ -z "$BIN" ]; then
            echo "ERROR: TerrariaServer.bin.x86_64 not found"
            find vanilla_extract -type f | sort
            exit 1
          fi

          ROOT="$(dirname "$BIN")"
          cp -a "$ROOT"/. "$RUNTIME_DIR"/
          chmod +x "$RUNTIME_DIR/TerrariaServer.bin.x86_64"

          echo "vanilla" > "$SERVER_DIR/.server_type"
          echo "${{ inputs.vanilla_version }}" > "$SERVER_DIR/.server_version"

          echo "Runtime files:"
          find "$RUNTIME_DIR" -maxdepth 5 -type f | sort | head -n 700

      - name: Install TShock server
        if: ${{ steps.decide.outputs.need_install == 'true' && inputs.server_type == 'tshock' }}
        run: |
          set -e

          echo "============================================================"
          echo "INSTALL TSHOCK SERVER"
          echo "============================================================"

          rm -rf "$RUNTIME_DIR" tshock_extract tshock.zip
          mkdir -p "$RUNTIME_DIR" tshock_extract

          VERSION="${{ inputs.tshock_version }}"

          if [ "$VERSION" = "latest" ]; then
            API_URL="https://api.github.com/repos/Pryaxis/TShock/releases/latest"
          else
            API_URL="https://api.github.com/repos/Pryaxis/TShock/releases/tags/$VERSION"
          fi

          echo "API URL: $API_URL"
          echo "Release assets:"
          curl -s "$API_URL" | jq -r '.assets[].name'

          URL="$(curl -s "$API_URL" | jq -r '.assets[] | select(.name | test("linux-x64.*Release\\.zip$")) | .browser_download_url' | head -n 1)"

          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "ERROR: Could not find TShock linux-x64 Release zip"
            exit 1
          fi

          echo "Download URL: $URL"
          curl -L "$URL" -o tshock.zip

          echo "ZIP info:"
          ls -lh tshock.zip
          unzip -l tshock.zip | head -n 300

          unzip -q tshock.zip -d tshock_extract

          TAR_FILE="$(find tshock_extract -type f -name '*.tar' | head -n 1)"
          if [ -n "$TAR_FILE" ]; then
            echo "Found inner tar: $TAR_FILE"
            mkdir -p tshock_extract/tar
            tar -xf "$TAR_FILE" -C tshock_extract/tar
          fi

          TSHOCK_BIN="$(find tshock_extract -type f -name 'TShock.Server' | head -n 1)"

          if [ -z "$TSHOCK_BIN" ]; then
            echo "ERROR: TShock.Server not found"
            find tshock_extract -type f | sort
            exit 1
          fi

          ROOT="$(dirname "$TSHOCK_BIN")"
          cp -a "$ROOT"/. "$RUNTIME_DIR"/
          chmod +x "$RUNTIME_DIR/TShock.Server"

          echo "tshock" > "$SERVER_DIR/.server_type"
          echo "$VERSION" > "$SERVER_DIR/.server_version"

          echo "Runtime files:"
          find "$RUNTIME_DIR" -maxdepth 6 -type f | sort | head -n 900
          file "$RUNTIME_DIR/TShock.Server" || true

      - name: Install tModLoader server
        if: ${{ steps.decide.outputs.need_install == 'true' && inputs.server_type == 'tmodloader' }}
        run: |
          set -e

          echo "============================================================"
          echo "INSTALL TMODLOADER SERVER"
          echo "============================================================"

          rm -rf "$RUNTIME_DIR" tml_extract tmodloader.zip
          mkdir -p "$RUNTIME_DIR" tml_extract

          VERSION="${{ inputs.tmodloader_version }}"

          if [ "$VERSION" = "latest" ]; then
            API_URL="https://api.github.com/repos/tModLoader/tModLoader/releases/latest"
          else
            API_URL="https://api.github.com/repos/tModLoader/tModLoader/releases/tags/$VERSION"
          fi

          echo "API URL: $API_URL"
          echo "Release assets:"
          curl -s "$API_URL" | jq -r '.assets[].name'

          URL="$(curl -s "$API_URL" | jq -r '.assets[] | select(.name == "tModLoader.zip" or (.name | test("tModLoader.*Linux.*\\.zip$"))) | .browser_download_url' | head -n 1)"

          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "Trying first non-sha zip asset..."
            URL="$(curl -s "$API_URL" | jq -r '.assets[] | select((.name | test("\\.zip$")) and ((.name | test("sha|sha256|Symbols|symbols")) | not)) | .browser_download_url' | head -n 1)"
          fi

          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "ERROR: Could not find tModLoader server zip"
            exit 1
          fi

          echo "Download URL: $URL"
          curl -L "$URL" -o tmodloader.zip

          echo "ZIP info:"
          ls -lh tmodloader.zip
          unzip -l tmodloader.zip | head -n 300

          unzip -q tmodloader.zip -d "$RUNTIME_DIR"

          chmod +x "$RUNTIME_DIR/start-tModLoaderServer.sh" || true
          chmod +x "$RUNTIME_DIR/tModLoader" || true
          chmod +x "$RUNTIME_DIR/dotnet" || true

          if [ ! -f "$RUNTIME_DIR/start-tModLoaderServer.sh" ]; then
            echo "ERROR: start-tModLoaderServer.sh not found"
            find "$RUNTIME_DIR" -maxdepth 6 -type f | sort
            exit 1
          fi

          echo "tmodloader" > "$SERVER_DIR/.server_type"
          echo "$VERSION" > "$SERVER_DIR/.server_version"

          echo "Runtime files:"
          find "$RUNTIME_DIR" -maxdepth 6 -type f | sort | head -n 900

      - name: Print server directory
        run: |
          echo "============================================================"
          echo "SERVER DIRECTORY"
          echo "============================================================"
          echo "SERVER_DIR=$SERVER_DIR"
          echo "RUNTIME_DIR=$RUNTIME_DIR"
          echo "WORLD_DIR=$WORLD_DIR"
          echo "LOG_DIR=$LOG_DIR"
          echo "PLAYIT_DIR=$PLAYIT_DIR"
          echo
          find "$SERVER_DIR" -maxdepth 7 -type f | sort | head -n 1500

      - name: Start playit for Terraria in tmux
        run: |
          set -e

          echo "============================================================"
          echo "START PLAYIT IN TMUX"
          echo "============================================================"
          echo "Local Terraria port: ${{ inputs.local_port }}"
          echo "Playit config dir saved at: $PLAYIT_DIR"
          echo
          echo "FIRST RUN INSTRUCTIONS:"
          echo "1. This workflow starts playitd daemon first."
          echo "2. Then it starts playit CLI frontend in tmux to show claim/setup."
          echo "3. If the link/code is not visible in job log, SSH in and run: tmux attach -t playit"
          echo "4. Claim this agent on playit.gg."
          echo "5. Create a TCP tunnel: 127.0.0.1:${{ inputs.local_port }}"
          echo "============================================================"

          mkdir -p "$PLAYIT_DIR"
          mkdir -p "$PLAYIT_DIR/home"
          mkdir -p "$PLAYIT_DIR/config"
          mkdir -p "$PLAYIT_DIR/config/playit_gg"
          mkdir -p "$LOG_DIR"
          rm -f "$PLAYIT_DIR/playit.pid"
          rm -f "$PLAYIT_DIR/start-playit.sh"
          rm -f "$PLAYIT_DIR/playit.sock"
          : > "$LOG_DIR/playit-live.log"

          sudo mkdir -p /run/playit
          sudo chmod 777 /run/playit

          echo "Downloading playit daemon and CLI binaries..."
          API_URL="https://api.github.com/repos/playit-cloud/playit-agent/releases/latest"

          echo "Release assets:"
          curl -s "$API_URL" | jq -r '.assets[].name' || true

          PLAYIT_DAEMON_URL="$(curl -s "$API_URL" | jq -r '.assets[] | select(.name == "playit-linux-amd64") | .browser_download_url' | head -n 1)"
          PLAYIT_CLI_URL="$(curl -s "$API_URL" | jq -r '.assets[] | select(.name == "playit-cli-linux-amd64") | .browser_download_url' | head -n 1)"

          if [ -z "$PLAYIT_DAEMON_URL" ] || [ "$PLAYIT_DAEMON_URL" = "null" ]; then
            echo "ERROR: Could not find playit-linux-amd64 from GitHub release."
            exit 1
          fi

          if [ -z "$PLAYIT_CLI_URL" ] || [ "$PLAYIT_CLI_URL" = "null" ]; then
            echo "ERROR: Could not find playit-cli-linux-amd64 from GitHub release."
            exit 1
          fi

          echo "Daemon URL: $PLAYIT_DAEMON_URL"
          curl -L "$PLAYIT_DAEMON_URL" -o playit-linux-amd64
          chmod +x playit-linux-amd64

          echo "CLI URL: $PLAYIT_CLI_URL"
          curl -L "$PLAYIT_CLI_URL" -o playit-cli-linux-amd64
          chmod +x playit-cli-linux-amd64

          cat > "$PLAYIT_DIR/start-playit.sh" <<'EOF'
          #!/usr/bin/env bash
          set -e
          cd "$GITHUB_WORKSPACE"

          SOCKET_PATH="$GITHUB_WORKSPACE/$PLAYIT_DIR/playit.sock"
          SECRET_PATH="$GITHUB_WORKSPACE/$PLAYIT_DIR/config/playit_gg/playit.toml"

          rm -f "$SOCKET_PATH"
          mkdir -p "$(dirname "$SECRET_PATH")"

          echo "============================================================"
          echo "PLAYIT TMUX SESSION"
          echo "============================================================"
          echo "Daemon: ./playit-linux-amd64"
          echo "CLI: ./playit-cli-linux-amd64"
          echo "Socket: $SOCKET_PATH"
          echo "Secret: $SECRET_PATH"
          echo "HOME=$GITHUB_WORKSPACE/$PLAYIT_DIR/home"
          echo "XDG_CONFIG_HOME=$GITHUB_WORKSPACE/$PLAYIT_DIR/config"
          echo "Attach from SSH with: tmux attach -t playit"
          echo "Detach with: Ctrl+B then D"
          echo "============================================================"

          cleanup() {
            if [ -n "${DAEMON_PID:-}" ]; then
              kill "$DAEMON_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          if [ -n "${PLAYIT_SECRET_KEY:-}" ]; then
            echo "PLAYIT_SECRET_KEY is set. Starting playit daemon with secret key."
            env \
              HOME="$GITHUB_WORKSPACE/$PLAYIT_DIR/home" \
              XDG_CONFIG_HOME="$GITHUB_WORKSPACE/$PLAYIT_DIR/config" \
              SECRET_KEY="$PLAYIT_SECRET_KEY" \
              ./playit-linux-amd64 \
              --socket-path="$SOCKET_PATH" \
              --secret-path="$SECRET_PATH" &
          else
            echo "PLAYIT_SECRET_KEY is not set. Starting playit daemon for first-run setup."
            env \
              HOME="$GITHUB_WORKSPACE/$PLAYIT_DIR/home" \
              XDG_CONFIG_HOME="$GITHUB_WORKSPACE/$PLAYIT_DIR/config" \
              ./playit-linux-amd64 \
              --socket-path="$SOCKET_PATH" \
              --secret-path="$SECRET_PATH" &
          fi

          DAEMON_PID=$!
          echo "playit daemon pid: $DAEMON_PID"
          echo "$DAEMON_PID" > "$GITHUB_WORKSPACE/$PLAYIT_DIR/playit-daemon.pid"

          echo "Waiting for playit socket..."
          for i in $(seq 1 30); do
            if [ -S "$SOCKET_PATH" ]; then
              echo "Socket is ready."
              break
            fi
            if ! kill -0 "$DAEMON_PID" 2>/dev/null; then
              echo "ERROR: playit daemon exited early."
              exit 1
            fi
            sleep 1
          done

          if [ ! -S "$SOCKET_PATH" ]; then
            echo "ERROR: playit socket was not created: $SOCKET_PATH"
            exit 1
          fi

          echo "============================================================"
          echo "STARTING PLAYIT CLI FRONTEND"
          echo "============================================================"
          echo "The claim/setup link or code should appear below."
          echo "If the job log does not show it clearly, attach with: tmux attach -t playit"
          echo "============================================================"

          exec env \
            HOME="$GITHUB_WORKSPACE/$PLAYIT_DIR/home" \
            XDG_CONFIG_HOME="$GITHUB_WORKSPACE/$PLAYIT_DIR/config" \
            TERM=xterm-256color \
            ./playit-cli-linux-amd64 --socket-path="$SOCKET_PATH"
          EOF

          sed -i 's/^[[:space:]]*//' "$PLAYIT_DIR/start-playit.sh"
          chmod +x "$PLAYIT_DIR/start-playit.sh"

          echo "============================================================"
          echo "PLAYIT START SCRIPT"
          echo "============================================================"
          cat "$PLAYIT_DIR/start-playit.sh"

          tmux kill-session -t playit 2>/dev/null || true
          tmux new-session -d -s playit "$GITHUB_WORKSPACE/$PLAYIT_DIR/start-playit.sh"

          sleep 2
          PLAYIT_PANE_PID="$(tmux display-message -p -t playit '#{pane_pid}')"
          echo "$PLAYIT_PANE_PID" > "$PLAYIT_DIR/playit.pid"
          echo "PLAYIT_MODE=tmux-daemon-cli" >> "$GITHUB_ENV"

          echo "Waiting for playit to print setup info..."
          sleep 12

          echo "============================================================"
          echo "PLAYIT INITIAL TMUX OUTPUT"
          echo "============================================================"
          tmux capture-pane -t playit -p -S -1000 | tee "$LOG_DIR/playit-live.log" || true

          echo "============================================================"
          echo "PLAYIT SETUP LINK OR CODE DETECT"
          echo "============================================================"
          CLAIM_LINK="$(grep -Eo 'https://[^ ]*(playit.gg|pit.gd)[^ ]*' "$LOG_DIR/playit-live.log" | head -n 1 || true)"

          if [ -n "$CLAIM_LINK" ]; then
            echo
            echo "============================================================"
            echo "OPEN THIS LINK TO SETUP PLAYIT"
            echo "============================================================"
            echo "$CLAIM_LINK"
            echo "============================================================"
            echo
          else
            echo "No URL detected in job log yet."
            echo "SSH in and run: tmux attach -t playit"
            echo "Look for the claim link or claim code in the playit TUI."
          fi

          echo "Checking playit tmux session for up to 2 minutes, then continuing to Terraria."
          for i in $(seq 1 8); do
            echo
            echo "============================================================"
            echo "PLAYIT CHECK $i/8"
            echo "============================================================"

            if ! tmux has-session -t playit 2>/dev/null; then
              echo "ERROR: playit tmux session exited early."
              echo "Captured playit output:"
              cat "$LOG_DIR/playit-live.log" || true
              exit 1
            fi

            tmux capture-pane -t playit -p -S -1000 | tee "$LOG_DIR/playit-live.log" || true
            NEW_LINK="$(grep -Eo 'https://[^ ]*(playit.gg|pit.gd)[^ ]*' "$LOG_DIR/playit-live.log" | head -n 1 || true)"
            if [ -n "$NEW_LINK" ]; then
              echo
              echo "============================================================"
              echo "PLAYIT SETUP LINK"
              echo "============================================================"
              echo "$NEW_LINK"
              echo "============================================================"
              echo
            fi

            sleep 15
          done

          echo "============================================================"
          echo "PLAYIT TMUX READY"
          echo "============================================================"
          echo "Attach playit console: tmux attach -t playit"
          echo "Detach: Ctrl+B then D"
          echo "Terraria local target: 127.0.0.1:${{ inputs.local_port }}"
          echo "Public Terraria address: check playit.gg dashboard after setup."
          echo "Saved playit config: $PLAYIT_DIR"
          echo "============================================================"

          echo "============================================================"
          echo "PLAYIT CONFIG FILES"
          echo "============================================================"
          find "$PLAYIT_DIR" -maxdepth 8 -type f -print -exec ls -lh {} \; || true

      - name: Start Terraria server in tmux
        run: |
          set -e

          WORLD_FILE="$WORLD_DIR/${{ inputs.world_name }}.wld"
          PASSWORD="${{ inputs.server_password }}"
          WORLD_SEED="${{ inputs.world_seed }}"
          SERVER_TYPE="${{ inputs.server_type }}"

          echo "============================================================"
          echo "START TERRARIA SERVER IN TMUX"
          echo "============================================================"
          echo "Server type: $SERVER_TYPE"
          echo "World file: $WORLD_FILE"
          echo "Local port: ${{ inputs.local_port }}"
          echo "Max players: ${{ inputs.max_players }}"
          echo "World size: ${{ inputs.world_size }}"
          echo "Difficulty: ${{ inputs.difficulty }}"
          echo "Runtime dir: $RUNTIME_DIR"
          echo "tmux session: terraria"
          echo
          echo "Attach after SSH:"
          echo "  tmux attach -t terraria"
          echo
          echo "Detach:"
          echo "  Ctrl+B then D"
          echo "============================================================"

          mkdir -p "$LOG_DIR"

          tmux kill-session -t terraria 2>/dev/null || true
          rm -f "$SERVER_DIR/server.pid"
          rm -f "$SERVER_DIR/start-terraria.sh"
          : > "$LOG_DIR/server-live.log"

          if [ "$SERVER_TYPE" = "tshock" ]; then
            cat > "$SERVER_DIR/start-terraria.sh" <<EOF
          #!/usr/bin/env bash
          set -e
          cd "$GITHUB_WORKSPACE"
          CMD=(
            "$RUNTIME_DIR/TShock.Server"
            -world "$WORLD_FILE"
            -autocreate "${{ inputs.world_size }}"
            -difficulty "${{ inputs.difficulty }}"
            -port "${{ inputs.local_port }}"
            -maxplayers "${{ inputs.max_players }}"
            -configpath "$TSHOCK_CONFIG_DIR"
            -logpath "$LOG_DIR"
          )
          if [ -n "$PASSWORD" ]; then
            CMD+=( -pass "$PASSWORD" )
          fi
          if [ -n "$WORLD_SEED" ]; then
            CMD+=( -seed "$WORLD_SEED" )
          fi
          exec "\${CMD[@]}"
          EOF

          elif [ "$SERVER_TYPE" = "vanilla" ]; then
            cat > "$SERVER_DIR/start-terraria.sh" <<EOF
          #!/usr/bin/env bash
          set -e
          cd "$GITHUB_WORKSPACE"
          exec "$RUNTIME_DIR/TerrariaServer.bin.x86_64" -config "$CONFIG_FILE"
          EOF

          elif [ "$SERVER_TYPE" = "tmodloader" ]; then
            cat > "$SERVER_DIR/start-terraria.sh" <<EOF
          #!/usr/bin/env bash
          set -e
          cd "$RUNTIME_DIR"
          exec ./start-tModLoaderServer.sh \
            -config "$GITHUB_WORKSPACE/$CONFIG_FILE" \
            -tmlsavedirectory "$GITHUB_WORKSPACE/$SERVER_DIR"
          EOF

          else
            echo "ERROR: unknown server type: $SERVER_TYPE"
            exit 1
          fi

          sed -i 's/^[[:space:]]*//' "$SERVER_DIR/start-terraria.sh"
          chmod +x "$SERVER_DIR/start-terraria.sh"

          echo "============================================================"
          echo "START SCRIPT"
          echo "============================================================"
          cat "$SERVER_DIR/start-terraria.sh"

          tmux new-session -d -s terraria "$GITHUB_WORKSPACE/$SERVER_DIR/start-terraria.sh"

          sleep 2

          tmux pipe-pane -t terraria -o "cat >> '$GITHUB_WORKSPACE/$LOG_DIR/server-live.log'"

          TMUX_PANE_PID="$(tmux display-message -p -t terraria '#{pane_pid}')"
          echo "$TMUX_PANE_PID" > "$SERVER_DIR/server.pid"

          sleep 25

          echo "============================================================"
          echo "TMUX SESSIONS"
          echo "============================================================"
          tmux ls || true

          echo "============================================================"
          echo "PROCESS"
          echo "============================================================"
          ps aux | grep -Ei 'Terraria|TShock|tModLoader|dotnet|tmux' | grep -v grep || true

          echo "============================================================"
          echo "PORTS"
          echo "============================================================"
          netstat -tulpn || true
          lsof -i -P -n | grep "${{ inputs.local_port }}" || true

          echo "============================================================"
          echo "SERVER LOG"
          echo "============================================================"
          tail -n 300 "$LOG_DIR/server-live.log" || true

          if ! tmux has-session -t terraria 2>/dev/null; then
            echo "ERROR: Terraria tmux session exited early."
            echo "Full server log:"
            cat "$LOG_DIR/server-live.log" || true
            exit 1
          fi

      - name: Print connection info
        run: |
          echo "============================================================"
          echo "SERVER READY"
          echo "============================================================"
          echo "Terraria:"
          echo "  Provider: playit.gg"
          echo "  Local target: 127.0.0.1:${{ inputs.local_port }}"
          echo "  Public address: check playit.gg dashboard"
          echo "  First run: open the setup/claim link printed in the Start playit step"
          echo
          echo "Admin:"
          echo "  Type: ${{ inputs.connection_type }}"
          if [ "${{ inputs.connection_type }}" != "none" ]; then
            echo "  Protocol: $ADMIN_PROTOCOL"
            echo "  User: ${{ inputs.ssh_user }}"
            echo "  Pass: ${{ inputs.ssh_password }}"
            echo "  Ngrok: $NGROK_URL"
          fi
          echo
          echo "tmux:"
          echo "  Attach Terraria: tmux attach -t terraria"
          echo "  Attach playit: tmux attach -t playit"
          echo "  Detach: Ctrl+B then D"
          echo
          echo "Server:"
          echo "  Type: ${{ inputs.server_type }}"
          echo "  World: $WORLD_DIR/${{ inputs.world_name }}.wld"
          echo "  Saved full server folder: $SERVER_DIR"
          echo "  Saved playit folder: $PLAYIT_DIR"
          echo "  Runtime minutes: ${{ inputs.run_minutes }}"
          echo "============================================================"

      - name: Run server with tmux monitor
        run: |
          RUN_SECONDS=$((${{ inputs.run_minutes }} * 60))
          END_TIME=$(($(date +%s) + RUN_SECONDS))

          echo "Running for ${{ inputs.run_minutes }} minutes..."
          echo
          echo "SSH attach commands:"
          echo "  tmux attach -t terraria"
          echo "  tmux attach -t playit"
          echo
          echo "Detach:"
          echo "  Ctrl+B then D"
          echo
          echo "Cancel this run to stop. It will not auto-restart on cancel/failure."

          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            if ! tmux has-session -t terraria 2>/dev/null; then
              echo "ERROR: Terraria tmux session is not running."
              echo "Last server log:"
              tail -n 300 "$LOG_DIR/server-live.log" || true
              exit 1
            fi

            if ! tmux has-session -t playit 2>/dev/null; then
              echo "ERROR: playit tmux session is not running."
              echo "Last playit output:"
              tail -n 300 "$LOG_DIR/playit-live.log" || true
              exit 1
            fi

            echo
            echo "============================================================"
            echo "LIVE STATUS $(date)"
            echo "============================================================"

            echo "--- tmux sessions ---"
            tmux ls || true

            echo "--- processes ---"
            ps aux | grep -Ei 'Terraria|TShock|tModLoader|dotnet|playit|ngrok|xrdp|sshd|tmux' | grep -v grep || true

            echo "--- ports ---"
            lsof -i -P -n | grep -E '${{ inputs.local_port }}|3389|:${{ inputs.ssh_port }}' || true

            echo "--- playit tmux output ---"
            tmux capture-pane -t playit -p -S -200 | tee "$LOG_DIR/playit-live.log" || true

            if [ "${{ inputs.connection_type }}" != "none" ]; then
              echo "--- ngrok log ---"
              tail -n 60 /tmp/ngrok.log || true
            fi

            echo "--- server log ---"
            tail -n 120 "$LOG_DIR/server-live.log" || true

            sleep 120
          done

      - name: Stop services
        if: always()
        run: |
          set +e

          echo "============================================================"
          echo "STOP SERVICES"
          echo "============================================================"

          if tmux has-session -t terraria 2>/dev/null; then
            echo "Stopping Terraria tmux session gracefully..."
            echo "Sending 'exit' to server console."
            tmux send-keys -t terraria "exit" C-m
            sleep 35

            if tmux has-session -t terraria 2>/dev/null; then
              echo "Server still running, sending Ctrl+C."
              tmux send-keys -t terraria C-c
              sleep 10
            fi

            if tmux has-session -t terraria 2>/dev/null; then
              echo "Server still running, killing tmux session."
              tmux kill-session -t terraria 2>/dev/null || true
            fi
          fi

          if tmux has-session -t playit 2>/dev/null; then
            echo "Capturing and stopping playit tmux session..."
            tmux capture-pane -t playit -p -S -1000 > "$LOG_DIR/playit-live.log" 2>/dev/null || true
            tmux send-keys -t playit C-c
            sleep 5
            tmux kill-session -t playit 2>/dev/null || true
          fi

          if [ -f "$PLAYIT_DIR/playit.pid" ]; then
            PLAYIT_PID="$(cat "$PLAYIT_DIR/playit.pid")"
            echo "Playit PID: $PLAYIT_PID"
            kill "$PLAYIT_PID" 2>/dev/null || true
          fi

          cp "$LOG_DIR/playit-live.log" "$LOG_DIR/playit-last.log" 2>/dev/null || true

          if [ -f /tmp/ngrok.pid ]; then
            kill "$(cat /tmp/ngrok.pid)" 2>/dev/null || true
          fi

          echo "============================================================"
          echo "FINAL PROCESS LIST"
          echo "============================================================"
          ps aux | grep -Ei 'Terraria|TShock|tModLoader|dotnet|playit|ngrok|tmux' | grep -v grep || true

          echo "============================================================"
          echo "FINAL SERVER TREE"
          echo "============================================================"
          find "$SERVER_DIR" -maxdepth 8 -type f | sort | head -n 2000 || true

          echo "============================================================"
          echo "FINAL PLAYIT TREE"
          echo "============================================================"
          find "$PLAYIT_DIR" -maxdepth 8 -type f | sort || true

          echo "============================================================"
          echo "FINAL SERVER LOG"
          echo "============================================================"
          tail -n 600 "$LOG_DIR/server-live.log" || true

          echo "============================================================"
          echo "FINAL PLAYIT LOG"
          echo "============================================================"
          tail -n 500 "$LOG_DIR/playit-last.log" || true

      - name: Save full server data
        if: always()
        run: |
          set +e

          echo "============================================================"
          echo "SAVE DATA"
          echo "============================================================"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Git status before add:"
          git status --short

          git add data

          echo "Git status after add:"
          git status --short

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Save Terraria server data"
            git pull --rebase || true
            git push
          fi

      - name: Trigger next run
        if: ${{ success() && inputs.auto_restart == 'true' && vars.STOP_TERRARIA_RESTART != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "============================================================"
          echo "AUTO RESTART"
          echo "============================================================"
          echo "Triggering next clean run..."
          echo "To stop future restarts, set repository variable STOP_TERRARIA_RESTART=true"

          gh workflow run "terraria-server.yml" \
            --ref "${{ github.ref_name }}" \
            -f runner_os="${{ inputs.runner_os }}" \
            -f server_type="${{ inputs.server_type }}" \
            -f force_reinstall="${{ inputs.force_reinstall }}" \
            -f tshock_version="${{ inputs.tshock_version }}" \
            -f tmodloader_version="${{ inputs.tmodloader_version }}" \
            -f vanilla_version="${{ inputs.vanilla_version }}" \
            -f vanilla_download_url="${{ inputs.vanilla_download_url }}" \
            -f world_name="${{ inputs.world_name }}" \
            -f world_seed="${{ inputs.world_seed }}" \
            -f world_size="${{ inputs.world_size }}" \
            -f difficulty="${{ inputs.difficulty }}" \
            -f max_players="${{ inputs.max_players }}" \
            -f server_password="${{ inputs.server_password }}" \
            -f local_port="${{ inputs.local_port }}" \
            -f connection_type="${{ inputs.connection_type }}" \
            -f ssh_user="${{ inputs.ssh_user }}" \
            -f ssh_password="${{ inputs.ssh_password }}" \
            -f enable_root_ssh="${{ inputs.enable_root_ssh }}" \
            -f ssh_port="${{ inputs.ssh_port }}" \
            -f timezone="${{ inputs.timezone }}" \
            -f run_minutes="${{ inputs.run_minutes }}" \
            -f auto_restart="${{ inputs.auto_restart }}"
